body:
  text: 學史卷八明邵寶撰酉凡三十章母在長安病篤太宗命馳驛召還承問憂悸不能食道病卒贈禮部尚書諡曰孝王圭駮曰無逸入蜀不能與母俱留卒京師子道未足稱不可謂孝乃更諡良唐書皇甫無逸傳日格子曰蜀道遠且難矣母能行與俱可也不然則辭官以養可也不然則就卑官以便養亦可也無逸有三失而獨以一焉蔽其不孝得無遺情乎唐時陳藏器著本草拾遺謂人肉治羸疾自是民間以父母疾多刲股肉而進唐書孝友傳日格子曰刲股之非孝也君子之為論久矣豫獨恨夫術者之不達聖賢之㫖也秦穆狥人春秋夷之充其類至斥作俑者為無後人肉療羸其為俑也大矣人子為之雖虧體猶可言也世有暴而謀身者能不為跖乎帝嘗命璟與蘇頲制皇子名與公主號遂差次所封且詔别擇一美稱及佳邑封上璟奏言七子均養詩人所稱今若同等别封或母寵子愛恐傷鳲鳩之平昔袁盎引卻慎夫人席文帝納之夫人亦不為嫌以其得長久計也臣不敢别封帝歎重其賢唐書宋璟傳日格子曰名以制義不可不慎也尚矣古之人有命太子曰仇而諸子曰成師者皆因事而名初無意焉者也而皆足以兆亂况擇焉而為之乎宋璟見遠於近知著於微其稱持正固亦識之所到也夫開元末夀王瑁以母寵欲立為太子􅍬陳申生戻園禍以諫𤣥宗改容謝之詔授給事中􅍬曰陛下絶招諫之路為日滋久今臣一言而荷殊寵則言者將衆何以錫之帝善其讓止不拜唐書裴􅍬傳日格子曰明皇絶諌路久矣稹一言而獲賞其受之禮也其辭焉以讓能者亦禮也顧為君虞賞不繼而卒不拜無乃為逄乎后感悟即日遣徐彥伯迎廬陵王於房州王至后匿王帳中召見仁傑語廬陵事仁傑敷請切至涕下不能止后乃使王出曰還爾太子仁傑降拜頓首曰太子歸未有知者人言紛紛何所信后然之更令太子舍龍門具禮迎還中外大悅唐書狄仁傑傳日格子曰廬陵還矣仁傑諷諌之力大矣密於帳中安知不再黜乎仁傑於是有顯迎之請焉還而無迎猶未成乎還也然亦有聞於昔乎書有之太保以仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外衡山公主既公除將下嫁長孫氏志寧以為禮女二十而嫁有故二十三而嫁固知遇喪須終三年春秋魯莊公如齊納幣母喪未再朞而圖婚二家不譏以其失禮明也今議者云公除從吉此漢文創制為天下百姓耳公主身服斬衰服可以例除情不可以例改心喪成婚非人情所忍於是詔公主待服除乃婚唐書于志寧傳日格子曰志寧之言其知漢文之所以為詔者矣漢文之詔其大指蓋為吏民而諒暗之制初未之及簡禮者樂於便已踵而行之遂使漢文負大罪於名教誰歟議禮能為志寧言者自婚而推之凡不係於吏民者皆可以已此志寧所謂心喪也則於孝乎何損之有晉武魏文宋孝宗獨不聞漢詔乎興平縣民上官興以醉殺人而逃聞械其父乃自歸京兆尹杜悰御史中丞宇文鼎以其就刑免父請減死詔兩省議以為殺人者死百王所守若許以生是誘之殺人也諫官亦以為言文宗以興免父囚近於義杖流靈州君子以為失刑唐書刑法志日格子曰唐文宗於是乎失刑哉未失也上官興歸獄之期於必死不若縱囚來歸者之期於幸免也是故殺一人固足以守天下之法釋一人尤足以惇天下之倫唐文宗於是乎失刑哉未失也抑文宗之失刑在陳𢎞志不在上官興舍彼議此何哉吳人之入楚楚昭王奔鄖鄖公之弟懷將殺王鄖公辛止之懷曰平王殺吾父在國則君在外則讎也見讎弗殺非人也鄖公曰君而討臣何讎之為若皆讎君則何上下之有乎吾先人以善事君成名於諸侯自鬭伯比以來未之失也今爾以是殃之不可懷弗聼曰吾思吾父不能顧矣鄖公以王奔隨王歸而賞及鄖懷子西諫曰君有二臣或可賞也或可戮也君王均之羣臣懼矣王曰夫子期之二子邪吾知之矣或禮於君或禮於父均之不亦可乎國語楚昭王十一年日格子曰以直報怨以德報德此聖人處恩讎者至矣楚昭王之賞與叔孫昭子之不怨抑何異也賞以勸孝固所以勸忠也君之政也無與於政者其將然乎雖然楚昭非能直也為德以寬身也其何足以語此范獻子聘於魯問具山敖山魯人以其鄉對獻子曰不為具敖乎對曰先君獻武之諱也獻子歸遍戒其所知曰人不可以不學吾適魯而名其二諱為笑焉唯不學也人之有學也猶木之有枝葉也木有枝葉猶庇䕃人而况君子之學乎國語魯昭公二十二年日格子曰范獻子耻不學與孟僖子病不能相禮者何如學之道博矣禮入國而問禁此學之大端也學則能問能問則何諱之不知哉是故學莫大於禮范獻子以枝葉言之何居抑吾於此可以觀國矣魯秉周禮故僖子之言然晉之於魯逺矣獻子之云不亦宜乎秦伯之弟針如晉修成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒撫劒從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之左傳襄公二十六年日格子曰使之於國大矣矧交彊國而可不選擇其人乎子員賢固不可以子朱當御廢告之遜而三云不應至肆撫劒之勇叔向於此舍拂衣其無處乎孟子曰薄乎云爾烏得無罪其叔向於子朱之謂矣吐蕃金城公主請文籍四種𤣥宗詔祕書寫賜休烈上疏曰吐蕃國之敵經籍國之典也且吐蕃之性慓悍果决善學不回若逹於書則知戰深於詩則知武夫有師干之試深於禮則知月令有廢興之兵深於春秋則知用師詭詐之計請去春秋夫春秋當周德既衰諸侯盛彊征伐競興情僞於是乎生變詐於是乎起誠與之國之患也疏入詔中書門下議侍中裴光庭曰吐蕃不識禮經今求哀稽顙許其降附漸以詩書斯可致也休烈但見情僞變詐於是乎生不知忠信節義亦於是乎在帝曰善遂與之唐書于休烈傳日格子曰王言為令聖言為經覆載之內孰不是訓令可遐略不可遐遺惟經亦然夷而請書其情雖不可知可億逆而拒之乎春秋名分之書也名分莫大乎華夷尊攘之道於是焉吐蕃有人心則是一經足以為感化之地矣謂頒經而舍春秋獨何見歟秋七月禘於太廟用致夫人非禮也夫人何以不稱姜氏貶曷為貶譏以妾為妻也其言以妾為妻奈何蓋脅于齊媵女之先至者也公羊傳僖公八年日格子曰致夫人之說三傳不同今就公羊氏論之媵之先至則奈之何齊大而邇世為婚姻其不安於媵也固矣有鄭忽之志辭之可也婚可辭而媵不可辭乎失此不圖至於至焉亦曰惟禮可以已之禮莫大於分嫡妾之分定於初矣先後至不與焉此所謂已之以禮者也可以已之而不已齊之罪乎魯之罪乎輔公祏反寇夀陽詔孝恭為行軍元帥討之引兵趨九江李靖李績黃君漢張鎮周盧祖尚皆禀節度將發大饗士杯水變為血坐皆失色孝恭自如徐曰禍福無基唯所召爾顧我不負於物無重諸君憂公祏禍惡貫盈今仗威靈以問罪杯中血乃賊臣授首之祥乎盡飲罷衆心為安唐書元王孝恭傳日格子曰討叛之必克孝恭以義知之非以祥知之其託祥以云蓋安衆之道然也衆心安而后士氣壯克之道或在是乎然則雖謂知之以祥亦可也逄丑父者頃公之車右也面目與頃公相似衣服與頃公相似代頃公當左使頃公取飲頃公操飲而至曰革取清者頃公用是佚而不反逄丑父曰吾賴社稷之神靈吾君已免矣卻克曰欺三軍者其法奈何曰法斫於是斫逄丑父公羊傳成公二年日格子曰逄丑父斫而免君何如曰可也曰免君之死而不能成君之死如之何其可也曰國君死社稷禮也社稷未至於亡雖免焉不亦可乎雖然佚而弗反其為楚車也大矣欲免失位之譏於君子可得哉可得哉彘之亂宣王在召公之宫國人圍之召公曰昔吾驟諫王王不從以及此難今殺王子王其以我為懟而怒乎夫事君者險而不懟怨而不怒况事王乎乃以其子代宣王宣王長而立之國語共和十四年日格子曰彘之亂國人圍召公之宫何至於以子代王太子而豫之衆怒如水焉不與之不止也此召公之權也我以吾子彼以王太子名毁而實存公為社稷謀至矣於道則未盡也然則奈何匿而勿豫茍迫焉則以身狥之國人方德召公必無并殺之理使伊尹周公處之則當何如有伊尹周公則無彘之亂或有之亦如是而已矣是故以身狥者正也以子代者權也雖然道隆則隆道汚則汚伊尹周公之事召公其將能乎𤣥少子十歲獨遊門次卒有三人持杖劫執之入舍登樓就𤣥求貨𤣥不與有頃司𨽻校尉陽球率河南尹洛陽令圍守𤣥家球等恐并殺其子未欲迫之𤣥瞋目呼曰姦人無狀𤣥豈以一子之命而縱國賊乎促令兵進於是攻之𤣥子亦死日格子曰劫質而并殺之可乎執而治之可也貨以免焉而徐圖執之亦可也茍疾之甚而快於一去彼被質者何不辜如之如之何其可也且殺人于貨其視夫弒父與君者異矣謂之國賊不亦過乎破吐蕃靈州而朝恩使人發其父墓盜未得子儀自涇陽來朝中外懼有變及入見帝唁之即號泣曰臣久主兵不能禁士殘人之墓人今發先臣墓此天譴非人患也唐書郭子儀傳日格子曰汾陽之父之墓發於魚朝恩汾陽之智豈不及知哉君子之於小人固當容之耳抑汾陽久主兵柄其對君亦當如此易曰包荒書曰惟干戈省厥躬汾陽於是乎兼有之矣順宗病不得語王叔文與牛美人用事權震中外憚廣陵王雄睿欲危之帝召絪草立太子詔絪不請輒書曰立嫡以長跪白之帝頷乃定唐書鄭絪傳日格子曰為天子草詔請而後書禮也書而後白權也惟執經以處變可以行權不然則否變莫大於病不能語經莫大於立嫡以長河東節度使王鍔賂權近求兼宰相密詔中書門下曰鍔可兼宰相藩遽取筆滅宰相字署其左曰不可還奏之宰相權德輿失色曰有不可應别為奏可以筆塗詔邪藩曰勢迫矣出今日便不可止既而事得寢唐書李藩傳一夕遣使持手詔欲以劉氏為貴妃沆對使者引燭焚詔附奏曰但道臣沆以為不可其議遂寢宋史李沆傳日格子曰此君所謂可而臣以為否者也三代君臣面相可否故為吁為咈後世不然則承密命而急不及奏者小否則塗大否則焚亦固不能已也雖然臣一也在謀議之地者可其他不可宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死左傳宣公二年日格子曰麑既告盾可以不死乎靈公欲死盾盾不死麑惡得不死麑不死必有死麑者矣然則萇從簡之卒何以不死靈公之死盾也以忌從簡之死富人也以需忌以去為快需以得為遂從簡之死富人固不若靈公之死盾之切也麑必死卒不必死麑也義卒也智其感之也皆以恭敬君子可不務乎五代史萇從簡傳許州富人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隱木間見其夫婦相待如賔二卒歎曰吾公欲奪其寶而害斯人吾必不免因躍出而告之使其速以帶獻遂踰垣而去不知其所之宰相韋貽範母喪詔還位偓當草制上言貽範處喪未數月遽使視事傷孝子心今中書事一相可辦陛下誠惜貽範才俟變縗而召可也學士使馬從皓逼偓求草偓曰腕可斷麻不可草從皓曰君求死邪偓曰吾職內署可默默乎明日百官至而麻不出宦侍合譟茂貞入見帝曰命宰相而學士不草麻非反邪艴然出帝畏茂貞卒詔貽範還相洎代草麻唐書韓偓傳日格子曰韓偓不為貽範草制正矣其曰俟變衰而召可乎有門庭之寇則從金革之事可也不然而從利亦晉之墨耳三年之內無日可者禮曰既葬各以其服除此變衰之候也衰可變哀不可變此時而可召安往不可哉禮疏曰三年之喪小祥後衰與大功同故曰功衰此所謂變衰也敬宗將幸東都裴度在興元憂之自表求覲與章偕來唐書崔咸傳日格子曰裴度欲止敬宗東都之行非面覲不可覲必表求禮也待報恐不及故與章偕來蓋禮之變如此有度之志可也不然將不涉於彊乎晉士丐帥師侵齊至穀聞齊侯卒乃還還者何善辭也何善爾大其不伐喪也此受命乎君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也公羊傳襄公十九年日格子曰閫外專制尚矣然專以趨利者有之未有專以從禮者也知禮非難知權為難故士丐見善於春秋重榮雖武夫而曉吏事其下不能欺有夫婦訟其子不孝者重榮拔劍授其父使自殺之其父泣曰不忍也其母從傍詬罵奪其劍而逐之問之乃繼母也重榮叱其母出從後射殺之五代史安重榮傳日格子曰劍而后知為繼母聽斯獄者亦踈矣當是時也使其父忍必劍之子死不足惜得無遺情乎凡非繼母者凖是以聽何如恩在家法在國恩絶而法用用法以義康誥曰速由文王作罰刑兹無赦商子寄字況與吕祿善及髙后崩大臣欲誅諸呂呂祿為將軍軍於北軍太尉勃不得入北軍於是乃使人劫酈商令其子況紿呂祿呂祿信之故與出遊而太尉勃乃得入據北軍遂誅諸呂天下稱酈況賣交也史記酈商傳日格子曰國為重則朋友為輕是故寄不紿祿産北軍不可入也酈生之節當以賣友為盛賣而取敗猶將褒之况一舉以定漢社稷哉陳涉之王也而魯諸儒持孔氏之禮器往歸陳王於是孔甲為陳涉博士卒與涉俱死史記儒林傳日格子曰諸儒從陳涉者使其不死其從叔孫氏乎涉且從之矣况有髙祖之召如之何其不從也執先聖之禮器以往而用舍不敢必焉蓋愚於從涉則必不能巧於事髙叔孫之巧可及也諸儒之愚不可及也當是時兩生獨安在哉前不從甲後不從通非有定見其何以與於此晉趙鞅取晉陽之甲以逐荀寅與士吉射荀寅與士吉射者曷為者也君側之惡人也此逐君側之惡人曷為以叛言之無君命也公羊傳定公十三年日格子曰鞅以衛貢殺午圍邯鄲荀范之亂鞅始之也故懼而奔公羊氏欲恕鞅而以取甲逐君側之惡歸之是加之大惡也鞅何辭於千古哉鞅不足惜而使天壤間有此稱號後世效尤者往往藉口焉則公羊氏之說啓之也魯祭周公何以為盛周公盛魯公燾羣公廪公羊傳文公十三年日格子曰新穀盈器故曰盛燾者覆也廪者連也物亦太辨矣蓋禮之謹如此魯廟八佾而遂及於羣公何莫非禮而僭乃至此哉張駿疆理西域張植為前鋒進屯鐡門未至十餘里熙又率衆先要之於遮留谷植將至或曰漢祖畏於柏人岑彭死於彭亡今谷名遮留殆將有伏植單騎嘗之果有伏發植馳擊敗之進據尉犂熙率其羣下四萬人肉袒降于宣晉書四夷焉耆傳日格子曰君子之行師也或以是告焉則如之何仲尼懼師而慎戰不聞亦然而况有所聞哉前茅之制尚矣聞而申警焉視柏如迫以圖不迫視亡如亡以圖不亡視留如留以圖不留是所以濟吾師也易曰其亡其亡繫於苞桑否則惑以荒否則肆以怠交址太守張恢坐贓千金徵還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也此贓罰之寶誠不敢拜帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意漢書鍾離意傳日格子曰贓入於君君之府庫也賜而不受禮歟非禮也孟子曰其交也以道其接也以禮斯孔子受之矣所謂禮者如此雖然賜出無名雖君命固所當辭也抑有警焉命下則拜教之屑拜已乃辭辭不獲則再拜以受朝夕顧諟唯共盜泉勝母亦安用是語為哉學史卷八
