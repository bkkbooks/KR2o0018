body:
  text: 學史史評類提要臣等謹案學史十二卷明邵寶撰寳字國賢無錫人成化二十年進士官至南京禮部尚書諡文莊事蹟具明史儒林𫝊寳所著有左觿容春堂集諸書俱别著録此書乃其為江西提學副使時所作為卷十有二以象月又餘其一以象閏每卷或三十條或二十九條以象月之有大小盡取程子今日格一物明日格一物之義名之曰日格子巡撫吳廷舉甞以上之於朝書中取自周迄元史事分條論列詞簡意該筆力頗為遒健其間如記後漢書譙𤣥用弟服去官戴封用伯父䘮去官事以為辟世與人不知後漢人情淳朴其以期功䘮解官持喪者見於史冊不一而足盖風俗使然寳疑為托故而逃未免失之不考又論荀彧以為志似管仲心似召忽非揚雄之比其評隲亦為過當然寳平生湛深經術持論平正究非胡寅之刻深尹起萃之膚淺者所可相擬固不失為儒者之言也乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fc504ba6adf9ff8c1115b7e3c36903f1bb0ade24545b9a19843e5853045c8a5b
