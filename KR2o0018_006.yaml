body:
  text: 學史卷六明邵寶撰未凡三十章石奢為楚相其父殺人奢縱之而還繫請罪卒不受赦令自刎死史記循吏列傳日格子曰君子之論奢嘗謂竊負而逃舜為天子然且可為而奢獨不可乎雖然下舜一等則奢其庶幾矣其言曰不私其父非孝子也不奉主法非忠臣也王赦其罪上惠也伏誅而死臣職也數言者亦豈茍云哉范文正公方貴顯時置負郭常稔之田千畝號曰義田以養濟羣族之人日有食嵗有衣嫁娶凶葬皆有贍擇族之長而賢者主其計而時其出納焉日食人一升嵗衣人一縑嫁女者五十千再嫁者三十千娶婦者三十千再娶者十五千葬者如再嫁之數葬幼者十千族之聚者九十口嵗入給稻八百斛以其所入給其所聚沛然有餘而無窮仕而家居候代者與焉仕而居官者罷其給錢公輔義田記日格子曰程子論孀婦謂餓死事極小失節事極大何范氏義田有再嫁之給也程子扶世教而立言范公處世變而立法其皆有所見乎然則再嫁之給倍再娶者何不能再娶者貧不能不再嫁者尤貧此事勢之固然也梁主素善鍾律欲釐正雅樂乃自制四器名之為通每通施三絃黄鍾絃用二百七十絲長九尺應鍾絃用一百四十二絲長四尺七寸四分差彊中間十律以是為差因以通聲轉推月氣悉無差違而還相得中又制十二笛黄鍾笛長三尺八寸應鍾笛長二尺三寸中間十律以是為差以寫通聲飲古鍾玉律並皆不差於是被以八音施以七聲莫不和韻隋書音樂志五季周顯德中詔王朴考正雅樂朴以為十二律管互吹難得其真乃依京房為律准以九尺之絃十三依管長短分寸設柱用七聲為均樂成而和五代史王朴傳日格子曰律和聲和以天也蕭梁之通王朴之凖和以人也律之制起於竹而通與凖皆成於絲古語有之絲不如竹其達於天人乎雖然後世又有用簫笛和聲者簫笛亦竹也然始之刋鑿終之抑按非人而孰為之簫笛異於律固然哉固然哉劉子𤣥中宗時遷太子左庶子兼崇文館學士皇太子將釋奠國學有司具儀從臣著衣冠乗馬子𤣥議古大夫以上皆乗車今陵廟巡謁王公冊命士庶親迎則盛服冠屨乗輅車他事無車故貴賤通乗馬韈而鐙跣而鞍非唯不師於古亦自取笑流俗太子從之因著為定令唐書劉子𤣥傳日格子曰曲禮之目衆矣未有不便於人者朝服乗馬且執笏焉於曲禮何當哉於是知子𤣥之議之為當也考錢氏之始終非有德澤施其一方百年之際虐用其人甚矣其動於氣象者豈非其孽歟五代史吳越世家日格子曰此歐陽子之論也蘇子之記表忠觀也其論則又有異於是者盖庇民之惠虐民之令固不相掩其服而歸于宋免民於兵革之苦者亦不可誣也君子盍參觀之贈其父故滄州刺史兵部尚書母夫人鄭氏梁國太夫人得立廟祭三代曾祖都水使者府君祭初室祖安東司馬贈襄州刺史府君祭二室兵部府君祭東室韓文田氏先廟碑日格子曰初室其西上乎二室次之東室又次之今之祠堂近是盖左昭右穆異廟之制也西上東下同堂之位也古者祫祭太祖東向户在東也今之户非古之户矣是以雖存西上之尊而穆位無所於列且對越者難於西向故以次而東盖禮之變也自唐則然矣且昌黎深於禮者其叙此也安然而無異詞則唐以上盖已行之論者不考堂之異同與户之南東而輙欲以左右昭穆施于堂中豈其未之考歟宋殺其大夫何以不名宋三世無大夫三世内娶也公羊傳僖公二十五年日格子曰諸侯不内娶説者以為不臣妻之父也如其禮也可行於諸侯而不可行於天子乎天下莫非王臣天子則何娶而可天子娶於諸侯古之人皆然不以親故廢尊亦不以尊故廢親親有時乎伸尊有時乎屈且以諸父則周公臣成王以諸兄則㣲子臣紂妻之父獨胡為其不可臣也斯禮也可行於天子而不可行於諸侯乎從璟從莊宗戰數有功為金槍指揮使明宗軍變于魏莊宗謂從璟曰爾父於國有大功今為亂軍所逼爾宜自徃宣朕意從璟馳至衛州為元行欽所執將殺之從璟呼曰願歸衛天子行欽釋之莊宗憐其言賜名從璟從莊宗如汴州將士多亡於道獨從璟不去左右或勸其逃禍從璟不聽莊宗聞明宗已渡黎陽復欲遣從璟通問行欽以為不可遂殺之歐陽子曰君父人倫之大本忠孝臣子之大節豈其不相為用而又相害者乎抑私與義而已耳盖以其私則兩害以其義則兩得其父以兵攻其君為其子者從父乎從君乎曰身從其居志從其義可也身居君所則從君居父所則從父其從於君者必辭其君曰子不可以射父願無與兵焉則又號泣而呼其父曰盍捨兵而歸我君乎君敗則死之父敗則終喪而事君其從於父者必告之曰君不可以射也盍捨兵而歸吾君乎君敗則死之父敗待罪於君君赦已則終喪而事之從璟之於莊宗知所從而得其死矣五代史唐明宗家人傳日格子曰昔者鄭子蘭從晉侯伐鄭而請無與圍鄭君子以為知義況君父之際哉身從其居志從其義孰謂從璟者處亂且遽而能善其所處如此哉歐陽公此論其得於禮矣太史公曰淮南衡山親為骨肉疆土千里列為諸侯不務遵藩臣職以承輔天子而專挾邪僻之計謀為畔逆仍父子再亡國亦其俗薄臣下漸靡使然也夫荆楚僄勇輕悍好作亂乃自古記之矣史記淮南衡山列傳日格子曰孔子曰夷狄之有君不如諸夏之亡也太史公叙淮南衡山列傳在東越朝鮮西南夷之後豈亦孔子之意邪淮南衡山故荆地也春秋於楚以州舉或人焉者不惟其地惟其道耳用夷禮則夷之盖春秋則然吾於淮南衡山抑何異哉太子燕㑹衆賓客數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君邪父邪衆人紛紜或父或君時原在坐不與比論太子諮之原勃然對曰父也太子亦不復難之魏邴原傳日格子曰天下事之難處莫甚於此忠臣孝子亦各自盡而已他人無與焉而問之何居得非欲假其言以濟已私邪家國之事固非一丸藥之可喻也一彼一此並行而相悖無足怪者抑亦豈不可求兩全之道乎不然為棄疾楚令尹子南子則有君臣而無父子為子胥則有父子而無君臣皆非君子所以處忠孝者也或曰原為曹丕謀故曰父也云丕獨無君乎丕之無君久矣原之言是助之也使管寧當是問也則如之何易曰君子之道或出或處或黙或語寧旣隱矣其將黙乎含兄畿咸寧中得疾就醫自療遂死於醫家家人迎喪旐每繞樹而不可解引喪者顛仆稱畿言曰我壽命未死但服藥太多傷我五臟耳今當復活慎無葬也其父祝之曰若爾有命復生豈非骨肉所願不爾葬也旐乃解及還其婦夢之其母及家人又夢之含乃曰非常之事古則有之乃發棺果有生驗然氣息甚㣲飲哺將護累月猶不能語飲食所須託之以夢含乃絶棄人事躬親侍養足不出户者十有三年晉書顔含傳日格子曰人死而復蘇者有之畿蘇矣能夢而不能言久之復死何也魂魄合而為人離散則死若畿者殆隂復而陽不復歟不然則其周旋不舍者何物也邪董晉為宰相時五月朔㑹朝天子在位公卿百執事在廷侍中賛百僚賀中書侍郎平章事竇參攝中書令當傳詔疾作不能事凡將大朝㑹當事者旣受命皆先日習儀于時未有詔公卿相顧晉逡巡進北面言曰攝中書令臣某病不能事臣請代某事於是南面宣致詔詞事已復位進退甚詳韓文董晉行狀日格子曰董晉代竇參宣致詔詞於習儀所而先曰云云時公卿相顧而晉進退甚詳可為倉卒應事之法釐侯卒太子共伯餘立共伯弟和有寵於釐侯多予之賂和以其賂賂士以襲攻共伯於墓上共伯入釐侯羨自殺衛人因立和為衛侯是為武公史記衛康叔世家日格子曰予觀淇澳之風抑之雅盖嘗歎武公之德粹矣季札觀樂又盛稱其德其没也謂之睿聖武公而史記乃有殺兄代立之説何其不類也昔者吾友李天瑞嘗問武公孟子人品於予予以聖人之徒答之行不義殺不辜武公豈為之哉武公豈為之哉不然則史遷所聞誤矣且朕旣不德無以佐百姓今崩又使人重服久臨以離寒暑之數以重吾不德也謂天下何史記漢文帝本紀日格子曰短喪之令出於漢文而行於景天下後世言不韙不歸之景而歸之文何也文賢者也以賢者為父且為君景烏得而違之是故責文而舍景亦春秋之意也居喪用喪禮除喪用吉禮因事而行乃常道也今若為開樂張宴則是特為一喜慶之事失禮意害人情無大於此雖曰故事祖宗亦不盡行伊川文集論開樂御宴日格子曰除喪用吉禮因事而行允乎禮哉鄒志完第進士調揚州潁昌府教授呂公著范純仁為守皆禮遇之純仁屬撰樂語浩辭純仁曰翰林學士亦為之浩曰翰林學士則可祭酒司業則不可純仁敬謝宋史鄒浩傳日格子曰成化初章編修懋黄編修仲昭莊檢討㫤以史官辭撰煙火致詞盖聞志完之風而興起者歟時無敬謝之人卒使三子上疏論列得罪以去能不媿純仁乎昔三代之君皆在河洛之間故嵩髙為中嶽而四嶽各如其方四瀆咸在山東至秦稱帝都咸陽則五嶽四瀆皆并在東方自五帝以至秦軼興軼衰名山大川或在諸侯或在天子史記封禪書日格子曰名山大川曷為表也為天下表也三代命祀位則奠矣故君有易都祀無易望偏安者望可以通乎未能治其人而欲有事於神是誣神也其誰饗之然則在諸侯者何如諸侯之地固天子之地也客有見髠於梁惠王惠王屏左右獨坐而再見之終無言也惠王怪之以讓客客以謂髠髠曰固也吾前見王王志在驅逐後復見王王志在音聲吾是以黙然客具以報王王大駭曰嗟乎淳于先生誠聖人也前淳于先生之来人有獻善馬者寡人未及視㑹先生至後先生之来人有獻謳者未及試亦㑹先生来寡人雖屏人然私心在彼有之後淳于髠見一語連三日三夜無倦惠王欲以卿相位待之髠因謝去於是送以安車駕駟束帛加璧黄金百鎰終身不仕史記孟子荀卿列傳日格子曰孟子三見齊王而不言事髠之無言其迹似之使其後所言者能出王道則髠亦何可訾哉雖然髠受賜而辭位終身不仕游士之中盖亦莫之能逮也趙孝成王德公子之矯奪晉鄙兵存趙乃與平原君計以五城封公子公子聞之意驕矜而有自功之色客有説公子曰物有不可忘或有不可不忘夫人有德於公子公子不可忘也公子有德於人願公子忘之也且矯魏王令奪晉鄙兵以救趙於趙則有功矣於魏則未為忠臣也公子乃自驕而功之竊為公子不取也於是公子立自責似若無所容者史記信陵君列傳日格子曰不可忘者以德報德也不可不忘者庶幾乎無施勞矣在戰國時其言之近理者乎虞卿欲以信陵君之存邯鄲為平原君請封公孫龍聞之夜駕見平原君曰王舉君而相趙割東武城而封君者非以君有功也為親戚故也今信陵君存邯鄲而請封是親戚受城而國人計功也此甚不可平原君遂不聽虞卿史記平原君列傳日格子曰親戚不可計功乎無功而以親戚封封而有罪可議也有功不可計也雖親戚也而封以功功有小大猶罪有小大也罪有至於不可赦則功有至於不可不計以是權之斯得之矣平原君家樓臨民家民家有躄者槃散行汲平原君美人居樓上臨見大笑之明日躄者至平原君門請願得笑者頭平原君笑應曰諾終不殺居嵗餘賓客門下舍人稍稍引去者過半平原君怪之門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳於是平原君乃斬笑躄者美人頭自造門進躄者因謝焉其後門下乃復稍稍来史記平原君列傳日格子曰笑躄之必戮以成好士名此戰國之習也設有賢君當此事也奈何賢君之後宫不使見躄而笑也然意向之輕重在心甚㣲而士之去就異焉可不慎哉可不慎哉遼西太守趙苞到官遣使迎母道經柳城值鮮卑萬餘人入塞寇鈔刼質苞母載以擊郡苞出戰對陳賊出母示苞苞悲號謂母曰為子無狀欲以㣲禄奉養朝夕不圖為母作禍昔為母子今為王臣唯當萬死無以塞罪母遥謂曰人各有命何得相顧以虧忠義苞即時進戰賊悉摧破其母為賊所害苞歸葬訖嘔血而死程子曰以君城降賊而求生其母固不可矣然亦當求所以生母之方奈何不顧而遽戰乎必不得已身徃降之可也徐庶於此盖得之矣後漢書趙苞傳日格子曰身可降城不可降然必有所託而圖為不可破者而後可以言不降也茍身降而城隨之其與幾何為苞計者守而不遽戰母庶其全乎或曰徐庶何如曰庶無專城其為去也異於苞矣夫人姜氏歸于齊惡宣公也姪娣者不孤子之意也一人有子三人緩帶一日就賢也穀梁傳文公十八年日格子曰此以情言也禮在其中矣雖然禮無二嫡故子有非嫡而母無非子奚必娣姪哉宋人請猛獲于衛衛人欲勿與石祁子曰不可天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之左傳莊公十二年日格子曰天下之惡一也此天下之名言也石祁子盖碏之族執喪而不肯冠冕佩玉以聽卜者其為賢久矣其能為是言也不亦宜乎閩人欲報仇或先食野葛而後趨仇家求鬭即死其處以誣仇人臻辯察格鬬狀被誣者徃徃釋去俗為之少變宋史王臻傳日格子曰予按察兩浙時聞三衢人亦有為此者盖衢地與建寧地邇固宜有之又聞有藥可即治為政者不可不知也徐鹿卿守建昌督府横取米五千斛鹿卿爭之曰守可去米不可得民恐失鹿卿請輸之以共命鹿卿曰民為守計則善矣守獨不為民計乎卒爭以免宋史徐鹿卿傳日格子曰建昌之民心即左内史之民心也然兒寛之逋乃所當輸者鹿卿之所見取與寛異矣爭之不亦宜乎公孫敖如京師不至而復丙戌奔莒左傳文公八年歸父如晉還自晉至笙遂奔齊宣公十八年楚箴尹克黄使於齊還及宋聞若敖氏旣滅其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗宣公四年日格子曰箴尹守經歸父達權公孫敖違禮壞法者也同使而異道如此夫石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也禮記檀弓篇日格子曰凡卜欲其敬也故卜人言然非為執喪者發也然則執喪而卜當奈何亦喪服而已禮固有喪服冠者卜獨不可乎石祁子於是乎知禮王一嵗而有三年之喪二焉於是乎以喪賓宴又求彞器樂憂甚矣且非禮也左傳昭公十五年日格子曰妻之喪子未除不可以再娶古之道也故周景王穆后薨太子壽卒叔向謂有三年之喪二季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位旣葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣乃討之召正常正常不反左傳哀公三年日格子曰正常之告南孺子之子男也可謂不負季桓子矣於是康子即位矣告不亦晚乎娠有期日始卒而告請需焉固愈於旣葬而徒告也雖然康子之立必有君命矣君將奈何因其請退而從之可也遂俾攝焉而約反嗣於他日亦可也學史卷六
