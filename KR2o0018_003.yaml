body:
  text: 學史卷三明邵寶撰辰凡三十章鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公將去穆氏而舍子良子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為乃舍之皆為大夫左傳宣公四年日格子曰己留而族亡子良何以為心故欲與族偕亡而卒存其族亦豈子良有心於要之哉讓國禮也偕亡禮也偕存亦禮也雖然子良於穆之族有義不同天者焉知權者當有以處之矣而區區於存亡之偕何居昔者彌子瑕見愛於衛君衛國之法竊駕君車者罪至刖既而彌子之母病人聞往夜告之彌子矯駕君車而出君聞之曰孝哉為母之故而犯刖史記韓非傳日格子曰此其事在彌子瑕無足論者若夫人人則母病雖聞君車不可矯而駕也聞母病而失視非孝子也矯君車罪則毁傷其肢體得為孝子乎抑事君於是為不忠是可為也孰不可為也楚子西子期伐吳及桐汭陳侯使公孫貞子弔焉及良而卒將以尸入吳子使大宰嚭勞且辭上介芋尹蓋對曰臣聞之事死如事生禮也於是乎有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎其何以為諸侯主吳人內之左傳哀公十五年日格子曰斯禮也吳人未之知也陳人亦未之知也禮賓終有于入竟者有于未將命者于入竟者主人為之殯介攝其命于未將命者以尸將事諸侯宋魯於是觀禮魯有禘樂賓祭用之宋以桑林享君不亦可乎左傳襄公十年日格子曰魯之郊禘非禮也周公其衰矣禘樂而用之賓非禮之中又非禮焉衰不亦甚乎孝公既見衛鞅語事良久孝公時時睡弗聽罷景監以讓鞅鞅曰吾説公以帝道其志不開悟矣後五日復見未中旨罷景監亦讓鞅鞅曰吾説公以王道而未入也鞅復見孝公善之而未用謂景監曰汝客善可與語矣鞅曰吾説公以霸道其意欲用之矣鞅復見與語不自知膝之前於席也語數日不厭史記商君傳日格子曰商君豈真知帝王道者哉知帝道者不屑於王知王道者不屑於伯而況於富強乎古之遺人物者必有所先商君之言帝王也其亦若將以為先者耳不然則將固孝公之心而以是嘗焉再嘗之而知其心之必在於富強也故一語而輒合蓋商君於富強之術深矣初共王無冢適有寵子五人無適立焉乃大有事于羣望而祈曰請神擇於五人者使主社稷乃遍以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於太室之庭使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐左傳昭公十三年日格子曰古人立子之道尚矣假於神以服人固不若稽古人之德也雖幸而中君子不取焉楚夷也其為是固宜公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也左傳襄公三十一年日格子曰晉侯重於見客為魯喪也推此心以及鄭則何至使鄭伯奔走於道路如是哉恤喪禮也睦親非禮乎陳侯扶其太子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免左傳襄公二十五年日格子曰舍而母將不可兩全乎全其身而虧於禮君子不謂全也臣而狎君女而瀆男非禮也雖顛沛其敢違之獲之對不曰非禮而曰不祥何居禮者履也舍履而言祥急遽而欲人之易信也如是哉趙王遷七年秦使王翦攻趙趙使李牧司馬尚禦之秦多與趙王寵臣郭開金為反間言李牧司馬尚欲反趙王乃使趙蔥及齊將顔聚代李牧李牧不受命趙使人徵捕得李牧斬之廢司馬尚史記李牧傳日格子曰嶽武穆被班師之詔或謂可以無受將在軍君命有所不受古之道也惟明主在上可以行之庸主則否武穆之還豈得已哉吾觀李牧之事於是益悲之治吳故國以軍功賜天子旌旗元光五年胸奴大入非上書願擊胸奴上不許史記江都王世家日格子曰魯之郊禘非禮也天子旌旗奚宜至於江都哉非之驕奢則漢有以啓之也當是時請擊胸奴而上或許之有功何以加賞有罪何以加罰雖然不許誠是也曷若謹之始乎太后於帝為從嫂朝議疑其服太學博士徐藻議曰資父事君而敬同又禮云其夫屬父道者妻皆母道也則夫屬君道妻亦后道矣服后以齊母之義也魯譏逆祀以明尊卑今上躬奉康穆哀皇及靖后之祀致敬同於所天豈可敬之以君道而服廢於本親謂應齊衰期從之晉書康獻褚皇后傳日格子曰有君道則有父道有父道則有母道生以事之死為之服禮也是故知祀之逆則君道定矣知敬之同則父道存矣若夫母道則屬之固然有不必論者雖然朝議疑之不有君子則服惡乎定乎代宗睿真皇后沈氏開元末入東宫賜廣平王生德宗天寶亂賊囚東都掖庭王入洛復留宮中時方北討未及歸長安而河南為史思明所沒遂失后所在代宗立以德宗為皇太子詔訪不能得德宗即位乃具册前上皇太后尊號中書舍人髙參上議宜用漢故事分遣諸沈行州縣物色審知行在然後奉迎帝乃使使者分行天下故中官髙力士女頗能言禁中事而年狀差似后又后嘗削脯哺帝傷左指髙亦嘗剖瓜傷指是時宫中無識后者於是迎還上陽宮馳以聞帝喜羣臣皆賀力士子知非是具言其情詔貸之憲宗即位有司言皇太后沈氏厭代二十七年參訪理絶請因啓殯詔羣臣為皇太后發哀肅章內殿中人奉廞衣置幄坐宫中朝夕上食告天地宗廟上太皇太后諡册作神主祔代宗廟備法駕奉褘衣納于元陵詔曰可唐書代宗睿真皇后傳日格子曰此人子之至痛也訪道盡而不得舍有司者之言則何以哉似者至矣希富貴也而真者何乃不至此吾所謂訪道之盡者也而未之盡者何哉王方慶為鳳閣侍郎神功初武攸宜破契丹凱還且獻俘內史王及善以孝明帝忌月請備鼓吹而不作方慶曰晉穆帝納后當康帝忌月時以為疑荀訥謂禮有忌日無忌月自月而推則忌時忌年愈無理據世用其言臣謂軍方大凱作樂無嫌詔可唐書王方慶傳日格子曰禮有忌日無忌月忌月之論何從而起哉忌繁而諱多亂世之道也楚有士申鳴者養其父孝王欲授之相辭不受既而承父命為楚相居三年白公為亂申鳴辭父往敵因以兵圍之白公往取其父持之以兵告申鳴曰子不與吾子父則死申鳴流涕而應之曰吾不得為父之孝子乃君之忠臣也援桴鼓之遂殺白公其父亦死王賞之金百斤申鳴自殺説苑日格子曰申鳴之於父猶趙苞之於母也然苞於鮮卑猶若有可為者抑亦難矣白公何人不為忠臣而奚為哉吾於是益悲二子之不幸也圉公陽穴宫負王以如昭夫人之宮葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日月以幾若見君面是得艾也民知不死其亦夫有奮心猶將旌君以徇於國而又掩面以絶民望不亦甚乎乃免胄而進左傳哀公十六年日格子曰或謂胄或謂不胄二者則奚從均之繫民望也不胄之繫民也近虛胄之繫民也近實必不得已其從胄乎不然入門之際能揚言以諭乎衆衆不信而后免胄其可乎光少與光武同遊學及光武即位光乃隱不見帝思其賢訪之聘之三反而後至即日幸其館光臥不起帝歎息而去復引光入論道舊故因共偃臥光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共臥爾除為諌議大夫不屈乃耕於富春山漢書嚴光傳日格子曰或問陵何如人曰陵之告侯霸曰懷仁輔義天下説觀斯言也可以知陵矣且陵亦處莽之時矣而名無聞焉至是始以節終孔子曰邦有道危言危行邦無道危行言孫其陵謂邪潛侃之曾孫也少有髙趣博學不羣以親老家貧為州祭酒少日自解歸召主簿不就躬耕自資遂抱羸疾後復為彭澤令不以家自隨送一力給其子書曰此亦人子也可善遇之在官八十餘日郡遣督郵至縣吏請曰應束帶見之潛歎曰我豈能為五斗米折腰向鄉里小兒即日解印綬去賦歸去來辭著五柳先生傳以自見徵著作郎不就晉書陶潛傳日格子曰淵明在晉嘗為州祭酒為彭澤令及徵著作郎不就朱子書其卒不以官稱何前為貧而就辟非朝命也著作之徵則出朝命矣辭焉豈無意哉且事以後定也於是乎書君子以齊人殺哀薑也為已甚矣女子從人者也左傳僖公元年日格子曰女子從人常禮也不曰預弒二君乃稔惡乎況齊桓以伯討之曷謂已甚此説行天討不加於武曌女禍滋矣宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也左傳襄公三十年日格子曰女婦異道乎易曰恆其德貞婦人吉貞也者女婦一也而謂婦異於女未之前聞也公羊曰伯姬之婦道盡矣君子哉君子哉莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾展輿奔吳君子曰莒展之不立棄人也夫人可棄乎詩曰無競維人善矣左傳昭公元年日格子曰展輿與弒父者也其不立者以是爾今略之而歸咎於棄人茍如是將謂不棄人焉雖弒父無傷也豈君子之論哉舍人朱異議禮年雖未及成人已有爵命者則不為殤封陽侯年雖中殤已有拜封不應殤服帝可之於是諸王服封陽侯依成人之服隋書禮儀志日格子曰童汪踦以戰死魯人問於孔子喪而勿殤是故有有功而勿殤有有德而勿殤有封拜而勿殤其亦可也閏月葬齊景公閏不書此何以書喪以閏數也喪曷為以閏數喪數略也公羊傳哀公五年日格子曰春秋閏月不書嘗以朝廟書矣為告月也此葬齊景公書則明喪之數閏也喪以月數者數閏以年數者雖有閏無與於數也然則襄二十八年楚子昭卒曷為不書始死之月未與於喪數也吳之入楚也使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨逢滑當公而進左傳哀公元年日格子曰周勃左右袒之計其出於此乎當是時使其人左之右之亦若此也其如大事何哉君子之於衆也以理觀情斯得之矣會慶節上壽在郊禮散齋內議權作樂燾言漢唐祀天地散齋四日致齋三日建隆初郊亦然自崇寧大觀法周禮祭天地故前十日受誓戒今既合祭宜復漢唐及建隆舊制庶幾兩得宋史李燾傳日格子曰上壽禮非古也日妨郊齋不可以已乎宋之郊沿漢唐而崇寧大觀始法周禮誓戒十日前此古禮之幸存者也既不能已乃欲變郊禮而從之此之謂舞禮安在其為兩得也宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平左傳宣公十五年日格子曰華元夜入楚軍登牀而起子反告之以病説者譏其輕見情實蹈不測之險抑不知元於此蓋有術焉固將以牀上之盟而易城下之盟哉言情而藝遽詞遜而意劫不然子反何其懼也何其懼也蓋戰國之策已兆於斯矣彌逺拜右丞相陳晦草制用昆命元龜語思歎曰董賢為大司馬册文有允執厥中一言蕭咸以為堯禪舜之文今制詞所引此舜禹揖遜也有如咸者讀之得不大駭乎乃上省牘請貼改麻制詔下分析宋史倪思傳日格子曰嫌之别於禮大矣故雖小物必謹曽謂制詞而可援引非倫乎器數之不可不辨也人皆知之至於言語書策率謂虛文而天下之典禮實於是乎在不有君子誰其辨諸太史言十一月朔日當食心八分燾條上古今日食是月者三十四事因奏之曰心天王位其分為宋十一月於卦為復方潛陽時隂氣乘之故比他食為重宋史李燾傳日格子曰日食之説詩書春秋詳矣而以十一月朔重者則未之聞也陽復於子其氣尚微君子之欲養之也蓋無所不至焉而隂乃乘之災孰有大於此者乎心春秋所謂大辰也日食於星孛其戾尤甚宋有天下矣故國之分野雖不論焉亦可也髙祖十年七月太上皇崩使人召豨豨稱病甚史記陳豨傳日格子曰漢太上皇何時崩哉史記於帝紀不書獨豨傳偶及之且月而不日恩禮可見矣為天子父而不以天下葬可謂禮乎文帝詔曰已下服大紅十五日小紅十四日纎七日釋服史記孝文本紀日格子曰漢文三十六日服於已下之後蓋既葬未忍即除也東漢以後易月二十七日則以所聞先後薄益甚矣前以三等服後以再期日義雖各有所取如天下之通義何烏乎甚矣世變日降而禮不可復也賈生以為漢興至孝文二十餘年天下和洽而固當改正朔易服色立制度定官名興禮樂乃悉草具其事儀法色尚黃數用五為官名悉更秦之法孝文帝初即位謙讓未遑也史記賈誼傳日格子曰此復古之會也文帝安於簡陋不知自強遂使先王禮樂後世無聞焉雖然豈特文帝之咎哉絳灌諸臣則有責矣論者謂漢制不能復古歸尤於叔孫通通之時非誼之時也通徇而卑誼引而髙誼不能強文帝通能強髙祖乎是故漢制不能復古任其咎者文帝與絳灌諸臣其能辭諸學史卷三
