body:
  text: 學史卷七明邵寶撰申凡二十九章當是時中尉條侯周亞夫與梁相山都侯王恬開見釋之持議平乃結為親友張廷尉由此天下稱之史記張釋之傳日格子曰書曰推賢讓能庶官乃和張釋之在漢廷固所謂賢且能者亞夫恬開知之推焉讓焉禮也乃結為親友則謂之何黨邪比邪史遷謂由此天下稱之其見釋之抑亦淺矣楚子期伐陳吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還左傳哀公十年日格子曰華元子反情以要盟春秋譏之季子之救陳乃自退於楚得無與之類乎季子以三代之道而息民華元以戰國之術而救國季子道隆而意逺華元術勝而道微衛穆公卒晉三子自役弔焉哭於大門之外衛人逆之婦人哭於門內送亦如之遂常以葬左傳成公二年日格子曰此弔禮之變也三子者自役至焉未復命故也衛人以變禮處之可也凡弔者豈皆自役遂常以葬謂之何哉周人有喪魯人有喪周人弔魯人不弔穀梁傳定公元年日格子曰魯人之不弔不敢弔也臣之於君喪其禮奔奔必後父之殯殯而後奔不亦緩乎此禮之變也曽子問君未殯而臣有父母之喪則如之何孔子曰歸殯反君所在君所且然而况逺若周與魯者哉是故夫禮則然禮莫大於君臣父子變之道於是乎觀王生者善為黃老言處士也嘗召居廷中三公九卿盡會立王生老人曰吾襪解顧謂張廷尉為我結襪釋之跪而結之既已人或謂王生曰獨奈何廷辱張廷尉使跪結襪王生曰吾老且賤自度終無益於張廷尉張廷尉方今天下名臣吾故聊辱廷尉使跪結襪欲以重之史記張釋之傳日格子曰王生以結襪重張廷尉何哉其所謂重者命之結而結生所謂重也然生亦何以知廷尉必能成生之重哉昔者圯下之進履老人者欲抑良以教之非以進履為重也生何以教廷尉者而使結襪邪汲黯揖大將軍禮也禮不失已亦不失人是故已重人亦重若生之結襪吾見其自輕而輕人耳雖然釋之當景帝初懼以前過誅用王生計卒見謝斯豈其所謂計邪蓋黃老之術如此周公何以稱大廟于魯封魯公以為周公也周公拜乎前魯公拜乎後曰生以養周公死以為周公主公羊傳文公十三年日格子曰此封國之變也周公之功大矣周公封魯公嗣禮也周公相魯公封亦禮也周公拜魯公安得不拜魯公拜周公亦安得不拜禮之變蓋如此梁王歸就國而梁王聞其議出於袁盎諸大臣所怨望使人來殺袁盎袁盎顧之曰我所謂袁將軍者也公得母誤乎刺者曰是矣刺之置其劒劒著身視其劒新治問長安中削厲工工曰梁郎某子來治此劒以此知而發覺之發使者捕逐之獨梁王所欲殺大臣十餘人文吏窮本之謀反端頗見太后不食日夜泣不止景帝甚憂之問公卿大臣大臣以為遣經術吏往治之乃可解於是遣田叔呂季主往治之此二人皆通經術知大禮來還至霸昌廏取火悉燒梁之反辭但空手來對景帝曰何如對曰言梁王不知也造為之者獨其幸臣羊勝公孫詭之屬為之耳謹以伏誅死梁王無恙也景帝喜説曰急趨謁太后太后聞之立起坐飱氣平復故曰不通經術知古今之大禮不可以為三公及左右近臣少見之人如從管中窺天也史記梁世家日格子曰經術與文吏異乎權輕重於骨肉之間唯知道者能之程子論薄昭之死可以決斯議矣始大臣誅諸呂時朱虛侯功尤大許盡以趙地王朱虛侯盡以梁地王東牟侯及孝文皇帝立聞朱虛東牟之初欲立齊王故絀其功史記齊悼惠王世家日格子曰朱虛侯章吕氏壻也獨能深惟大義毅然倡之當是時微章劉之安否未可知也其欲立齊王亦豈大失哉及事定之後顧坐是以絀其功疑生於嫌雖文帝不免焉良可惜矣程子謂人臣之義王陵為正愚於章亦云竇太后曰皇后兄王信可侯也景帝曰請得與丞相議之丞相亞夫曰髙皇帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也景帝默然而止其後胸奴王徐盧等五人降景帝欲侯之以勸後丞相亞夫曰彼背其主降陛下陛下侯之則何以責人臣不守節者乎景帝曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病景帝中三年以病免相史記絳侯世家日格子曰營門不得入亞夫於是為真將軍爭廢栗太子封王信徐盧等亞夫於是為真宰相王太后在民間時所生子女者父為金王孫王孫已死景帝崩武帝立王太后獨在而韓王孫嫣承間言太后有女在長陵武帝使使往先視之在其家武帝乃自往迎取之詔副車載馳還直入長樂宫行詔門著引籍通到謁太后曰女某邪曰是也為下泣女亦伏地泣武帝奉酒前為壽奉錢千萬奴婢三百人公田百頃甲第以賜姊史記外戚世家日格子曰事至武帝無善處者矣為景帝為王太后者當若之何君子作事謀始立后天下之大事也而可不謀乎納之非所納也立之非所立也始之不謹如此而欲善其後乎竇長君少君上書自陳竇皇后乃厚賜田宅金錢封公昆弟家於長安絳侯灌將軍等曰吾屬不死命乃且縣此兩人兩人所出微不可不為擇師傅賓客又復效呂氏大事也於是乃選長者士之有節行者與居竇長君少君由此為退讓君子不敢以尊貴驕人史記外戚世家日格子曰此可為保全外戚之法趙簡子死未葬中牟入齊已葬五日襄子起兵攻圍之未合而城自壞者十丈襄子擊金而退之軍吏諌曰君誅中牟之罪而城自壞是天助我何故去之襄子曰吾聞之叔向曰君子不乘人於利不迫人於險使人治城城治而後攻之中牟聞其義乃請降淮南子道應篇日格子曰襄子不厄人於險仁哉叔向之言乎然仁之施自親始葬五日而起兵抑何不類也蓋晉之習於墨久矣襄子之信襄公猶其信叔向也左傳僖公三十三年子墨衰絰敗秦師于殽獲孟明西乞墨白乙以歸遂墨以葬文公晉於是始烏乎文王之因壘尚矣一言之仁成則襄子敗則宋襄公然則君子之觀人豈可以成敗哉仁有同功仁有同過趙王遣相如奉璧西入秦史記藺相如傳日格子曰趙王知相如之必能完璧乎曰不知也相如能知秦之必歸璧乎曰不知也然則何以使相如以死殉璧趙王以意氣任相如璧完而相如歸趙重矣璧不返相如死之趙亦重矣國藝之重輕於是繫焉是行也良亦幸哉雖然璧之重不重於相如為一璧而失相如是以士豫敵也士亡則國隨之何璧之守哉古人有言匹夫無罪懷璧其罪豫亦曰國無釁得璧其釁趙王知是庶幾免夫秋七月辛丑盟吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯乃先晉人左傳哀公十三年日格子曰滕諸姬也薛異姓也諸侯相朝長滕侯禮也吳四夷也晉中國也兩伯並會先晉侯禮也王之在隨也子西為王輿服以保路國于脾泄聞王所在而後從王左傳定公五年日格子曰子西負其讓節故欲濟難以權可謂心乎社稷者矣雖然禮固有重於亡國者不可斯須去也是故子西非純臣也王孫由于嘗告之曰脾泄之事余亦弗能也其所以譏切之者至矣仲尼曰彼哉將不以是哉曹操幼子倉舒卒操傷惜之甚掾邴原有女早亡操欲求與倉舒合葬原辭曰嫁殤非禮也原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以為哉操乃止通志魏邴原傳日格子曰徇葬非禮也魏顆能違亂命於其父嫁殤非禮也曹操不能克私愛於其子此亦可以觀人矣原能辭殉而不能捨掾以去其視管寧能無愧乎初鄭公子蘭出奔晉從於晉侯伐鄭請無與圍鄭許之使待命于東鄭石甲父侯宣多逆以為太子以求成于晉晉人許之左傳僖公三十年日格子曰身從其奔而心從其宗從晉伐鄭而無與圍蘭之處兹變也其可也公如齊齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出左傳昭公二十七年日格子曰饗名而燕非禮也燕而宰獻且終之以媟非禮甚矣子家其明於君臣之分乎其明於男女之别乎不然既謝饗而復以君出何其果也會公主薨悰久不謝文宗怪之户部侍郎李珏曰比駙馬都尉皆為公主服斬衰三年故悰不得謝帝矍然始詔杖而期著于令唐書杜悰傳日格子曰斬衰三年子為父也妻為夫亦然以駙馬都尉而為公主服之則何謂也唐太宗禮遣其女正千載之謬胡為而有此制哉不然則髙宗以後或有變焉者至是猶未之復爾公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄左傳昭公二十九年日格子曰有一乳二子疑所長者或曰長先或曰長後夫生也者生也生先矣而曰長後可乎宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産盍求而與之子産曰出一玉以起二罪吾又失位韓子成貪將焉用之韓子買諸賈人既成賈矣請諸子産子産對曰昔我先君桓公與商人皆出自周世有盟誓以相信也今吾子以好來辱而謂敝邑強奪商人母乃不可乎韓子辭玉左傳昭公十六年日格子曰韓起求玉子産弗與既而買諸商又辭弗敢聞其辭可能也其貞信以忠不可能也抑於是而得處商人之道焉而商人之事上亦可謂有禮也已梁天監初齊臨川王獻所生妾謝墓被發不至埏門蕭子晉傅重咨禮官何佟之佟之議以為改葬服緦見柩不可無服故也此止侵墳土不及于椁可依新宫火處三日哭假而已帝以為得禮二年何佟之議追服三年無禫尚書議並以佟之言為得隋書禮儀志日格子曰衛司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母無服無服則弔服而加麻韓子謂自啓至于既葬而三月則除之未三月則服以終三月又謂今之弔服猶古之弔服也臨川王之於妾母無亦酌此而為之乎何佟之議何其過也度支奏誤漬為清樞密承旨孫隱中足成之上怒推按謫罰之唐鑑宣宗九年日格子曰漢石建誤書馬字懼獲譴死不失為醇謹之臣唐宣宗按罰孫隱中足成度支奏清字為漬不免為苛察之君君臣之道固不同也雖然石建之過藉用白茅之意也充孫隱中之心則將無所不欺矣書曰刑故無小豈謂是邪帝以朝長樂宫數蹕煩民乃築復道武庫南叔孫通諫曰此髙帝月出遊衣冠之道也子孫奈何乘宗廟道上行哉帝懼曰急壞之通曰願陛下為原廟於渭北衣冠月出遊之益廣宗廟大孝之本乃詔有司立原廟漢書惠帝紀日格子曰洛周公為天下營也文武廟於斯禮也漢立原廟于京師于所幸郡國斯異於洛之廟矣書曰黷于祭祀時謂弗欽其原廟之謂乎故事凡欲立皇后皇子必先以金鑄其象而占之以鑄成者為吉魏書后妃傳日格子曰大事稽疑龜筮至矣鑄金人敞俗也敝俗行之君子無論焉雖然龜筮無心故能決大疑金人之鑄事出乎工工人之中寧無為姦利如毛延壽者乎要之事不師古未見其可也臧氏之母養公者也君幼則宜有養者大夫之妾士之妻養公者必以其子入養臧氏之母聞有賊以其子易公抱公以逃公羊傳昭公三十一年日格子曰養公者公與其子孰重以國則公重以子則公與其子等爾然則為臧氏母者奈何臣固有以身徇國者矣況於子哉太史公曰國之將興君子用而小人退國之將亡賢人隱亂臣貴使楚王戊母刑申公遵其言趙任防與先生豈有篡殺之謀為天下僇哉賢人乎賢人乎非質有其內惡能用之哉史記楚元王世家日格子曰有其內而能用賢古之人則然也史遷及此亦有見哉古者臣有大喪則君三年不呼其門已練可以辨冕服金革之事君使之非也臣行之禮也閔子要絰而服事既而曰若此乎古之道不即人心退而致仕孔子蓋善之也公羊傳宣公元年日格子曰臣有大喪已練可以辨冕服金革之事公羊曰君使之非也臣行之禮也豫曰臣辭之禮也禮即人心者也晉師之救鄭者至曰請戰莊王許諾將軍子重諫曰晉大國也王師淹病矣君請勿許也莊王曰弱者吾威之強者吾辟之是以使寡人無以立乎天下令之還師而逆晉寇莊王鼓之晉師大敗晉衆之走者舟中之指可掬矣莊王曰嘻吾兩君不相好百姓何罪令之還師而佚晉寇公羊傳宣公十二年日格子曰詩曰柔亦不茹剛亦不吐楚莊之於晉鄭也有之而伐陳之從義大矣雖然其猶在秦穆之下乎秦穆之悔過聖賢之地也學史卷七
