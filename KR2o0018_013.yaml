body:
  text: 學史卷十三明邵寶撰閏凡二十九章齊宣王謂田過曰吾聞儒者喪親三年君與父孰重過對曰殆不如父重王忿然曰曷為士去親而事君對曰非君之土地無以處吾親受之於君致之於親凡事君以為親也宣王悒然無以應之韓詩外傳田過日格子曰父子之親君臣之義並立天地間未聞有所偏重也然尊無二上而親有一本故曰以王事辭家事不以家事辭王事又曰君子不奪人之親亦不可奪親也此天下之逹道也君子之仕也行其義也而謂事君以為親可乎或曰對君而言父重能不諛矣曰不有禮乎君問則曰敬同而君尊禮也父問則曰敬同而父親亦禮也太平興國中朝士祖吉典郡姦贓事覺下獄時郊禮將近太宗怒其貪墨諭百執政特俾郊赦不宥普奏曰敗官抵罪宜正刑辟然國家卜郊肆類所以對越天地告休神明吉本何人安足以隳改陛下赦令哉上善其對而止宋言行録趙普日格子曰郊赦非古也普為宗臣與聞立政不能用義裁定以止姦心遂成一代之著令他日秦再思者引諸葛佐蜀事上書普且昌言排之又安肯以一人而隳改哉君子謂普失於前不失於後宋史刑法志太宗嘗因郊禮議赦有秦再思者上書願勿赦引諸葛亮佐劉備數十年不赦事帝頗疑之趙普對曰凡郊祀肆眚聖朝彞典其仁如天若劉備區區一方臣所不取上善之遂定赦浚次秀州嘗夜坐警備甚嚴忽有客至前出一紙懷中曰此苗劉募賊公賞格也浚問欲何如客曰僕粗讀書知逆順豈以身為賊用特見為備不嚴恐有後來者耳浚下執其手問姓名不告而去浚翌日斬死囚徇于衆曰此苗劉刺客也宋史張浚傳日格子曰浚之待客可能也其斬囚徇衆以絶刺途則為略大矣或請先啓相王玄宗曰請而從是王與危事不從則吾計失矣乃夜率幽求等入苑中會兩儀殿梓宫宿衛兵皆起應之遂誅韋氏黎明馳謁相王謝不先啓相王泣曰賴汝以免不然吾且及難唐書玄宗本紀日格子曰玄宗之討韋后幾且密矣其不告相王不特從違之慮而已左右漏言尤有不可不虞者故父必稟命禮也事在宗社有大於稟命者雖不告可也古之人有之乎曰有舜不告而娶徐州張建封辟節度府未嘗察苛細建封卒濠州刺史杜兼疾驅至隂有覬望藩泣謂曰公今喪君宜謹守土何棄而來宜速還否則以法劾君兼錯忤去恨之因誣奏建封死藩撼其軍有非望德宗怒密詔徐泗節度使杜佑殺之佑雅器藩得詔十日不發召見藩曰世謂生死報應驗乎藩曰殆然曰審若此君宜遇事無恐因出詔示藩藩色不變曰信乎杜兼之報也佑曰愼毋畏吾以闔門保君矣帝未之信亟追藩既入帝望其狀貌曰是豈作亂人邪釋之拜祕書郎唐書李藩傳日格子曰詔殺不殺知不可殺也然則何以示之詔蓋欲觀其處死生之際焉者以深吾之知也抑將使益堅其所操執乎佑之於藩詳矣時制吏遭大喪者百日後皆給役有司徒吏解𢎞遭父喪後有軍事受勑當行以疾病為辭詔怒曰汝非曾閔何言毁邪促收考竟柔見𢎞信甚羸劣奏陳其事宜加寬貸帝乃詔曰孝哉𢎞也其原之魏書髙柔傳日格子曰父母之喪無貴賤一也吏遭大喪百日而給役何居人皆可以為曾閔而逆其不毁乎魏之制非古之道也𢎞非羸劣亦不見原矣或謂庶人終喪三年而後給役教天下以孝夫豈不可孔子曰博施濟衆堯舜其猶病諸而况後世也哉先生在從班時朝士迎天竺觀音於郊外先生與往有問何以迎觀音也先生曰衆人皆迎某安敢違衆又問然則拜乎曰固將拜也問者曰不得已而拜之與抑誠拜也曰彼亦賢者也見賢斯誠敬而拜之矣朱子記和靖事日格子曰魯人獵較孔子亦獵較義也迎觀音非獵較比也可以不違衆為義乎誠拜不得已拜皆不可永行縣到霸陵路經更始墓引車入陌從事諫止之永曰親北面事人寧有過墓不拜雖獲罪司𨽻無所避也遂下車拜哭盡哀而去西至扶風椎牛上茍諫塜帝聞之意不平問公卿曰奉使如此何如太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君後漢書鮑永傳日格子曰奉使而謁人之墓可乎使有輕重有緩急有吉凶有専泛重不敢謁急不暇謁吉不當謁專不可謁行縣到霸陵亦異於是數者矣君子之行事發乎情而止乎禮義禮義所得為而不能自遂尚可謂之善使乎耳敗走曰漢王與我有故而項王強立我我欲之楚甘公曰漢王之入關五星聚東井東井者秦分也先至必王楚雖強後必屬漢漢書張耳傳日格子曰五星之聚東井也其王者入關之兆乎漢髙度寬而法約固所謂王者也天之示人彰矣而占者乃曰先入關者當之使羽先入亦將當之乎或曰天下之分裂兵爭久矣此殆將定于一而息戈興文之兆也不可以分野而專歸之一人也宋之聚奎亦然初操壯侯之為人而察其心神無久留之意使張遼以其情問之侯嘆曰吾極知曹公待我厚然吾受劉將軍厚恩誓以共死不可背也吾終不留要當立效以報曹公乃去耳遼以侯言報操操義之及侯殺良操知其必去重加賞賜侯盡封其所賜拜書告辭而奔昭烈於袁軍左右欲追之操曰彼各為其主勿追也蜀漢本末關侯日格子曰關侯信義以行勇故見信義而不見勇勇以行信義故有去留而無生死大司農張晉為刑部時民有與父異居而富者父夜穿垣將入取資其子以為盜也瞷其入撲殺之及燭視尸則其父也吏議欲誅其子則子不以其為父欲釋無誅則有子殺父名久不能決晉奮筆曰殺賊可恕不孝當誅子有餘財而使父貧為盜不孝明矣卒殺之燕都市中遜志齋集日格子曰居厚資而不顧養不孝之罪大矣使非殺父于盜則當誅否乎此因殺而議焉者也若常刑則有國典在雖然夜不能辨形而能辨聲若聞父之聲以為不聞也者而殺之又執言以逃罪則罪不容於誅矣是在聽者耳當時吏議久不能決幾同癡詅即晉奮筆具獄亦不免辭費夫父而見戕于其子尚暇問其以貧纍父為不孝之罪哉春秋于許世子止書弒而三傳必以為不嘗藥一若於許世子猶有可解者宜貽後世以口實也鴈門人有害母者八坐奏轘之而瀦其室宥其二子虯駁奏云君親無將將而必誅誅逆者戮及期親害親者令不及子既逆甚梟獍禽獸不若而使禋祀不絶遺育承傳非所以勸忠孝之道存三綱之義若聖教含容不加孥戮宜投之四裔勑所在不聽配匹奏入宣武從之後魏書邢虯傳日格子曰弒父與君其惡一也弒君者誅其身至瀦其宫殲其類弒父者不然古人有言曰除惡務本故為國立法如此乃若逆子之子固父之孫也逆子之孫固父之曾孫也以一逆而遂俾無遺育父如有知其欲之乎且夫尊無二上國之主非家之主之可比也此法所以異也契丹犯邉從幸澶州雍王元份留守東京遇暴疾命旦馳還權留守事旦曰願宣寇準臣有所陳準至旦奏曰十日之間未有捷報時當如何帝默然良久曰立皇太子宋史王旦傳日格子曰寇準澶淵之策謂之知權可乎曰有王旦為留守則可何善乎旦之守也曰請宣準丹陽有莫氏妻生男眼在頂上大如兩嵗兒墜地而言曰兒是旱疫鬼不得住母曰汝當令我得過疫鬼曰上有官何得自由母可急作絳帽故當無憂母不暇作帽以絳繫髮自是旱疫者二年揚徐兖豫尤甚莫氏鄉鄰多以絳免他土效之旡驗隋書五行志日格子曰魃旱神也物於莫者其魃之變歟神固有攘之道焉物則不神戮焉而投諸水其可也莫既失矣而今之出孕婦以水之者又泛而非其物欲以攘災不亦難乎抑於俗尤有害者合衆鼓亂邇女宣淫召平東陵侯蕭何傳召平齊相齊悼惠王傳張禹字子文軹人安昌侯張禹傳張禹字伯逹襄國人太尉張禹傳陳咸字子康相人御史中丞陳萬年傳陳咸洨人成哀間尚書曾孫陳寵傳王莽右將軍燕刺王旦傳王莽篡漢國號新王莽傳日格子曰漢有兩召平有兩張禹有兩陳咸有兩王莽名同而實異平禹咸之異猶可言也莽之異不可言也名何貴於同哉而昔之人有慕藺而易焉者亦惑之甚矣向見尚書洪範箕子為武王陳五行隂陽休咎之應向乃集合上古以來歷春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳯兄弟起此論也然終不能奪王氏權漢書劉向傳日格子曰天人之應感不可以易言也劉向之為五行傳也何乃易易如此其究也子歆易名以應讖蓋無足怪者矣雖然天下後世言災祥者動則曰五行傳云豈皆其子哉甚矣天人之應感不可以易言也衛襄公夫人薑氏無子嬖人婤姶生孟縶孔成子夢康叔謂已立元余使羈之孫圉與史茍相之史朝見成子告之夢夢協晉韓宣子為政聘于諸侯之歲婤姶生子名之曰元孟縶之足不良弱行孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也左傳昭公七年日格子曰以夢長則誣以繇建則鑿惟曰孟非人也不可謂長其得之矣以是定嗣何他徴之有周官曰凡殺人而義者令勿讐讐之則死公羊傳曰父不受誅子復讐可也又周官曰凡報仇讐者書於士殺之無罪韓公復讐狀日格子曰子復父讐請誅於法正也不請而自行之令不可許不可不議也非司寇不得殺人民無相殺而義者殺人而義者其吏乎吏有公私故其殺人有不義不義故不受誅原孝子之心故曰復讐可也可者僅辭義而勿復已亂之道哉契丹遣使賀乾元節未至仁宗崩議者謂宜郤或欲候其及國門而諭使之還邵亢請命奉書至柩前使見嗣君從之宋史邵亢傳日格子曰禮曰吉凶異道不得相干書至柩前以賀而弔猶之可也使見嗣君以弔而賀豈禮也哉然則奈何先訃而却繼之可也時上禁行惡錢有二人在市以惡錢易好者武候執以聞上令悉斬之綽進諫曰此人坐當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上曰撼大木不動者當退對曰臣望感天心何論動木綽拜而益前訶之不肯退治書侍御史栁彧上表切諫上乃止隋書趙綽傳日格子曰趙綽之諫隋帝無乃賢於張釋之乎釋之外法於主綽內主於法內主於法者一言之得外法於主者一言之失趙抃為武安軍節度推官人有赦前偽造印更赦而用者法吏當以死抃曰赦前不用赦後不造不當死讞而生之宋史趙抃傳日格子曰人偽造者何印歟偽而不物唐律謂之寫寫即用用已復寫而清獻以赦前後别造用察矣厚矣其於法無乃近舞乎雖然定輕重者存乎律律者律也造重而用輕毫釐失當未見其能律也以是心而聽獄則何遺情之有裴嘉有婚會薛方士預焉酒中而樂作方士非之而出子聞之曰薛方士知禮矣然猶在君子之後乎文中子魏相篇日格子曰不獨為君子斯為君子矣知將用樂曷不先止之必待作焉非之而出也文公逐衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故於是已立然後為踐土之會治反衛侯衛侯得反曰叔武篡我元咺爭之曰叔武無罪終殺叔武元咺走而出公羊傳僖公二十八年日格子曰叔武以衛侯命攝盟晉文聽之人遂以為立也故以訴見殺然則晉文於叔武也不聽焉其可也聽則何以待之待之以衛侯之弟不以衛子子位莒子上弟不位莒子上然則如衛侯之從楚何從楚而不敢逃盟其從楚也可罪其不敢逃盟也可赦簡在天王之法而已無與焉則何至於衛侯重獲罪哉上曰吾聞黃帝不死今有冡何也或對曰黃帝已仙上天羣臣葬其衣冠史記漢武帝本紀日格子曰古之葬者厚衣之以薪不封不樹然而不能已者有體魄焉爾也黃帝既仙無體魄矣衣冠而葬何為哉易曰納約自牖武帝有牖如此羣臣不能自納焉而乃為逢以成方士之妄帝之暫明而倐晦羣臣亦與有罪焉周太祖入京師漢將相大臣未推戴也乃共奏太后遣太師馮道召徐州節度使贇贇漢髙祖弟崇之子嘗立為子者也初贇自徐州入也以都押牙鞏庭美教練使楊溫守徐州庭美等聞贇不得立乃閉城拒命太祖拜王彥超徐州節度使下詔諭庭美等許以刺史并詔贇赦庭美等廣順元年三月彥超克徐州庭美等皆見殺歐陽子曰贇於漢非嫡長特以周氏移國畏天下起而難之故假贇以伺間爾當是之時天下皆知贇之必不立也然庭美溫之區區為贇守孤城以死其始終之迹何愧於死節之士哉然豫考於實録二人之死狀不明夫二人之事固知其無所成其所重者死爾然史氏不著不知其何以死也當王彥超之攻徐州也周嘗遣人招庭美等豫得其詔書四皆言庭美等嘗已送款於周後懼罪而復叛然庭美等款狀亦不見是皆不可知也五代史漢家人傳日格子曰庭美等為贇守堅矣茍送款其待詔之四邪不款而曰款其意有三一安其衆二擕其下三以為加罪之地蓋周之為諼如此五代時如梁主弒於友圭而移罪友文何所不至而况坐款於庭美等哉西域平賀魯謂嗣業曰我亡虜也先帝厚我我則背之天降怒罰尚何道且聞漢法殺人必都市我願就死昭陵謝罪於先帝也帝曰先帝賜賀魯二千帳主之今罪人既得獻昭陵其可乎許敬宗曰古者軍凱還則飲至于廟若諸侯獻馘天子未聞獻于陵然陛下奉園寢與宗廟等可行不疑於是執而獻昭陵赦不誅唐書賀魯傳日格子曰獻俘於廟禮也于陵非禮也賀魯之請有祈赦之情焉故順而從之雖然此固待逺人之道也不然其可哉後母死服喪三年史記公孫𢎞傳日格子曰當是時服者鮮矣故於𢎞稱之右學史凡十三卷我文莊先公精思獨斷之書海內學者宗尚其説久矣原版為公門人虞山陳都憲擕拓浙藩遂燬於火勳圖重梓而力未贍也公之館甥秦齊南汶乃取舊藏初本復訂舛訛刻庋容春精舍以永厥傳君子多其尊信之誼云嘉靖甲辰秋七月朔男勳頓首百拜謹書學史卷十三
