body:
  text: 學史卷二明邵寶撰卯凡二十九章宋元王二年江使神龜於河至泉陽漁者豫且得之夜見夢於元王王悟召博士衞平問之平曰龜於是使馳問豫且出之籠載行入端門見於東廂身如流水潤澤有光望見元王延頸而前三步而止縮頸而卻復其故處元王見而怪之問衛平衛平對曰龜在患中而終昔囚王有德義使人活之今延頸而前以當謝也縮頸而卻欲亟去也元王曰善哉神至如此乎不可久留趣駕送龜勿令失期平曰龜者天下之寶先得者為天子且十言十當王能寶之諸侯盡服王勿遣也王三不可平三對勸勿遣王大悦再拜而受擇日齋戒乃刑白雉及驪羊以血灌龜以刀剥之史記龜筴傳日格子曰宋元王不忍於龜猶齊宣王不忍於牛也此皆所謂是心足以王矣者龜之為寶庸愈哉是故與其寶龜寧寶是心然九江大龜固有納錫之典矣得而弗取宜與夫古若不相似然納錫之龜猶庖人之牛見聞所不及者也其與夫延頸前卻於前者異矣納錫義也不殺仁也曹公孫會自鄸出奔宋奔未有言自者此其言自何畔也畔則曷為不言其畔為公子喜時之後諱也春秋為賢者諱何賢乎公子喜時讓國也其讓國奈何曹伯廬卒于師公子喜時見公子負芻之當主也逡巡而退賢公子喜時則曷為為會諱君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱也公羊傳昭公二十年日格子曰古有三為諱尊親賢尊親禮也賢吾惑焉賢者不諱過賢者而有惡尚得為賢者乎而諱之也其諸不幸而陷焉者歟不然則賢者之子孫也公羊子之説其必有所受矣會于戚討曹成公也執而歸諸京師諸侯將見子臧于王而立之子臧辭遂逃奔宋左傳成公十五年曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也敢私布之復請晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出左傳成公十六年日格子曰曹人重失鎮公子其意可識矣晉侯欲反子臧豈必謂子臧哉請於王致罪曹伯而以國命子臧此霸之得行於王而王之得行於諸侯者也子臧雖欲不反焉得而不反雖欲不立焉得而不立不然而徒反子臧豈曹人之志哉是故謂成子臧之節可謂定曹國之亂不可良嘗間從容步游下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲毆之為其老彊忍下取履父曰履我良業為取履因長跪履之父以足受笑而去良殊大驚隨目之父去里所復還曰孺子可教矣後五日平明與我會此良因怪之跪曰諾五日平明良徃父已先在怒曰與老人期後何也去曰後五日早會五日雞鳴良徃父又先在復怒曰後何也去曰後五日復早来五日良夜未半徃有頃父亦来喜曰當如是出一編書曰讀此則為王者師矣後十年興十三年孺子見我濟北穀城山下黄石即我矣遂去無他言不復見旦日視其書乃太公兵法也良因異之常習誦讀之史記留侯世家日格子曰秦銷兵器先秦兵書豈獨存乎萬或有一而圯上老人得以授良真非人間物矣老人髙良之義而怪其狙擊之勇於是乎教教在意不在言而況書哉是故為帝師而不自為用智而不用力守柔持謙而豫以待事凡旬日數見意之所示者至矣良平生有一出此乎然則所謂穀城黄石者何老人以是隱良以是神固亦授受之餘意也仁傑巡撫江南毁吳楚淫祠千七百所所存惟大禹太伯季札伍員四祠唐書狄仁傑傳日格子曰祠以功德存禹太伯尚矣季札次之員何人斯而亦與此其或有感於復讎之義也乎梁公之讎武曌猶員之讎楚平也曠世相感九原如可作也將員之與歸過其祠而忍毁之乎然則員祠卒不可毁邪在吳者宜存在楚則否昭憲太后不豫召趙普入受遺命謂太祖曰汝知所以得天下乎太祖曰祖考及太后之積慶也后曰不然正由周世宗使幼兒主天下故汝得至此汝萬嵗後當傳位光義光美以傳德昭國有長君社稷之福也太祖泣曰敢不如教宋史太祖本紀日格子曰太后何為有長君之命哉知子莫若母太宗之不能為周公太后見之明矣信如是太祖宜據兄亡弟及之禮傳位太宗詔告天下則名未嘗不正而言未嘗不順也何必展轉相授以致於子哉宋穆公立宣公而其子饗之君子曰義使太宗有宣公之心雖不子之屬子猶得立也不然身後之事其如人之不從何且周太王之欲傳位季厯為文王也吳子諸樊之欲傳位餘祭夷末為季子也今皆不然而亦為兄弟相傳之舉祗自生亂耳成王即位周公之屬傅相焉廼營成周洛邑以此為天下中諸侯四方納貢職道里均矣有德則易以王無德則易以亡凡居此者欲令周務以德致人不欲依阻險令後世驕奢以虐民也史記劉敬傳日格子曰周公之卜洛以中不以險亦不以不險孟子曰固國不以山谿之險以險者非也易曰王公設險以守其國以不險者非也朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅然能勝之人主從上方讀之止輒乙其處讀之二月乃盡史記東方朔傳日格子曰朔何言哉而武帝讀之若是其勤也董生之對何獨不然魏文侯端冕聽古樂則唯恐臥聽鄭衛之音則不知倦帝之情盖如是雖然朔之言亦每有風諫之意惜帝不能擇而用之耳陳勝之王也咎徃從之勝使魏人周市徇魏地立市為王市不受迎咎於陳五反陳王廼遣立咎為魏王章邯已破陳王進兵擊魏圍臨濟咎為其民約降約定咎自燒殺史記魏豹傳日格子曰魏咎於身與民可謂兩全之矣全民以生全身以死雖然非正也不可以訓子孔當國為載書以位序聽政辟大夫諸司門子弗順將誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定左傳襄公十年日格子曰子孔以焚書為衆為政是也不曰出入自爾師虞乎是亦衆為政也雖然有師虞之公則書何至於焚不然縱焚之媿其能已乎公送晉侯晉侯以公宴于河上問公年季武子對曰會于沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉禮也左傳襄公九年日格子曰聞之君子禮變於不得已季武子以魯君冠於衞之廟何不得已之有晉侯宴魯公於河上也年焉而命之冠驕則甚矣武子之對盍亦曰歸將冠矣小國之事大國其共固如此乃曲狥其意假鐘磬焉於衛謂之何哉禮茍變而可烏乎而不可王餘祭七年楚公子圍弑其王郟敖而代立餘昧二年楚公子棄疾弑其君靈王代立焉史記吳世家齊釐公十九年魯桓公弑其兄隱公而自立為君齊世家靈侯九年陳司徒招弑其君哀公曹成公五年晉欒書中行偃使程滑弑其君厲公管蔡世家陳哀公三十八年楚公子圍弑其君郟敖而自立為靈王陳世家衛成公二十六年齊邴歜弑其君懿公衛世家日格子曰太史公諸國世家於鄰國弑奪事皆書之若本國事然者何其不憚煩也齊陳恒弑其君孔子沐浴而朝告於哀公請討之孰謂鄰國之弑逆非本國事哉屠岸賈者始有寵於靈公及至於景公而賈為司寇將作難乃治靈公之賊以致趙盾徧告諸將曰盾雖不知猶為賊首以臣弑君子孫在朝何以懲辠請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今諸君將誅其後是非先君之意而今妄誅妄誅謂之亂臣有大事而君不聞是無君也屠岸賈不聽史記趙世家日格子曰名之弑賊則人得而討之晉之亂雖有為興而其詞則然亦可畏也春秋成而亂賊懼者以此夫君子甞斷斯獄矣子弑父凡在宮者殺無赦臣弑君凡在官者殺無赦未聞追族其子孫者董狐之書一國之斧鉞也當其時失賊不誅至於再世乃致之族謂之何哉張良曰昔者湯伐桀而封其後於把者度能制桀之死命也今陛下能制項籍之死命乎曰未能也其不可一也武王伐紂封其後於宋者度能得紂之頭也今陛下能得項籍之頭乎曰未能也其不可二也史記留侯世家日格子曰湯伐桀而封把禮也武王伐紂而封宋禮也良為帝籌而不欲其為湯為武何邪叔孫不食卒牛立昭子而相之昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上仲尼曰叔孫昭子之不勞不可能也左傳昭公五年甫瑕雖以劫殺鄭子内厲公厲公終背而殺之此與晉之里克何異史記鄭世家日格子曰叔孫昭子之不勞仲尼稱之鄭厲公之於傅瑕晉惠公之於里克其亦可與於此乎無瑕者可以戮人突圉之心非昭子之心也已致人於罪而欲戮人人雖死吾知其未服也莊公病將死以病召季子季子至而授之以國政曰寡人即不起此病吾將焉致乎魯國季子曰般也存君何憂焉公曰庸得若是乎牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎夫何敢公羊傳莊公三十二年子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰何難對曰芉姓有亂必季實立楚之常也左傳昭公十三年日格子曰此適然之變而以邪心成之者也不可為典也繼缺焉而后可以議及繼正也及權也長幼亦然長正而幼權杞微甚不足數楚惠王滅杞其後越王句踐興史記杞世家自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十二世而晉滅中國之虞中國之虞滅二世而夷蠻之吳興史記吳世家楚滅陳而田常得政於齊卒為建國百世不絶陳世家日格子曰天道之不爽如是哉聖人之有功於天下未有若舜禹稷者也報之以天下猶有遺澤焉季武子伐莒取鄆莒人吿於會楚吿於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其踁曰貨以藩身子何愛焉叔孫曰諸侯之會衛社稷也我以貨免魯必受師是禍之也何衛之為左傳昭公元年日格子曰此使之變也叔孫不以貨免其賢矣哉忘身而不忘國張審素為嶲州都督有陳纂仁誣其冐戰級私庸兵𤣥宗疑之詔監察御史楊汪即按纂仁復告審素與總管董堂禮謀反堂禮不勝忿殺纂仁以兵七百圍汪脅使露章雪審素罪旣而吏共斬堂禮汪遂當審素實反斬之沒其家琇與兄瑝尚幼徙嶺南久之逃還汪更名萬頃瑝琇夜狙萬頃於魏王池瑝斫其馬萬頃驚不及鬭為琇所殺吏捕以聞中書令張九齡等皆稱其孝烈宜貸死侍中裴耀卿等陳不可帝卒用耀卿議議者以為寃帝下詔申諭乃殺之唐書張琇傳日格子曰琇知父之寃而不知詔使之不可殺有親無君不可謂孝則何可貸之有雖然汪承詔即按乃復聽纂仁再告之辭不請而輒繫審素董堂禮不勝忿而殺之圍汪且脅焉審素與謀若否罪必有歸又不請命根究而輒加以斬固亦取殺之道也然則琇與瑝盍原其一乎而皆殺之則亦過矣齊太倉令淳于公有罪當刑其少女緹縈上書曰妾父為吏齊中皆稱其亷平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無由妾願沒入為官婢贖父刑罪天子憐悲其意下詔除肉刑史記文帝紀吉翂請代父死赦之丹陽尹王志欲於嵗首舉充純孝翂曰異哉王尹何量翂之薄乎父辱子死道固當然若翂當此舉乃是因父取名何辱如之固拒而止梁書吉翂傳日格子曰知漢文者其除肉刑乎議漢文者其除肉刑乎綱目不書縈事不繫於縈也縈也訟翂也服孟孫獵而得麑使秦西巴持歸烹之麑母隨之而嗁秦西巴弗忍縱而予之孟孫歸求麑安在秦西巴對曰其母隨而嗁臣誠弗忍竊縱而予之孟孫怒逐秦西巴居一年取以為子傅左右曰秦西巴有罪於君今以為子傅何也孟孫曰夫一麑而不忍又何況於人乎淮南子人間訓日格子曰不忍之心人皆有之而不能推之於政者利害惑焉故也秦西巴之舍麑也可與言不忍之政矣夫豈不知孟孫之必怒哉然而不為懼也不忍非難不懼為難不忍仁也不懼義也故君子非義不能成仁㣲子開者殷帝乙之首子而紂之庶兄也史記宋世家按尚書亦以為殷王元子呂氏春秋云㣲子生時母猶妾及為妃而生紂故㣲子為紂同母庶兄宋世家注日格子曰二女同降而或妻或妾皇英是也尊卑以年一母同出而或嫡或庶啟紂是也貴賤以分年以率常分以制變君子别嫌明㣲於是為至先時弓髙守備甚嚴有中使夜至守將不内旦乃得入中使大詬怒賊諜知之他日偽遣人為中使夜至守將遽内之賊衆隨入通鑑唐穆宗二年日格子曰於是乎知漢文之不馳亞夫之營之非迂也詔議遷穆宗以下出太廟吏部尚書李景讓上言穆宗乃陛下兄敬宗文宗武宗乃兄之子陛下拜兄尚可拜姪可乎宜遷四主出太廟還代宗以下入廟詔百官議不決而止時人以是薄景讓通鑑唐宣宗十年日格子曰君臣之分為重則兄弟叔姪之分為輕故仲尼以躋僖為逆祀或問馮唐面文帝得廉頗李牧不能用也諒乎曰彼將有激也親屈帝尊以信亞夫之軍至頗牧曷不用哉揚子法言重黎篇日格子曰文帝能用頗牧乎唐以尚知其不能雄以亞夫知其能也尚以恩亞夫以法文帝恭儉之主也儉故不能容尚恭故能容亞夫頗牧尚倫也非亞夫倫也長安廐吏乗駟馬車来迎買臣遂乗傳入吳界見其故妻妻夫治道買臣駐車呼令後車載其夫妻到太守舍置園中給食之居一月妻自經死買臣乞其夫錢令葬漢書朱買臣傳日格子曰使買臣之妻去而未嫁義可絶也亦可復也貴而来歸待之如初可也今旣嫁有夫矣遇諸途而乞憐焉賙而遣之足矣並載其夫歸置園中何為哉無乃買臣忿其夙昔而有驕之之意乎不然何為其自經死也死而葬之夫豈不能而乞其夫錢以葬出婦死後夫葬之禮也前夫葬之非禮也武年老子前坐事死上閔之問左右武在匈奴久豈有子乎武因平思侯自白前發匈奴時胡婦適産一子通國有聲問來願因使者致金帛贖之上許焉後通國隨使者至上以為郎漢書蘇建傳日格子曰節義如子卿不可使之無後也君子謂宣帝明於大體有王者之風焉宋以柴周之後為二恪又録孔子之後亦先王崇徳象賢之意也故皆為賓禮宋史賓禮志日格子曰㣲子之命有之稽古崇徳象賢崇之象之而不稽諸古非禮也易代之道二有伐有禪伐而封之為厚禪而封之薄矣封其子孫以奉其祀可也然則如周恭帝者何以處之其名號則固存也以天下養而終其身無以嫌隙間焉此亦稽古之義也若夫孔子為萬世宗師厯代褒崇則有禮矣以備三恪不亦逺乎帝思中興功臣乃圖於南宫雲臺馬援以椒房之親獨不與焉漢書馬武論日格子曰雲臺之功為靖莽亂也莽外戚也帝於此有深懲焉故馬援不與援莽之不可同語明矣君子知拔本塞源之義者不能不致謹於援於援且然而況功不如援者乎此帝詔後嗣之意也學史卷二
