body:
  text: 學史卷五明邵寶撰午凡三十章獨隂不生獨陽不生獨天不生三合然後生故曰母之子也可天之子也可尊者取尊稱焉卑者取卑稱焉穀梁傳莊公三年日格子曰父天母地孰非天之子而亶聰明作元后有宗子之道焉故曰天子尊之也尊之也者異之也如穀梁子所稱則夫人爾而人徒取尊稱焉何異之有吾故謂穀梁子善論生理者也非知天子之義者也禮庶子為君為其母築宮使公子主其祭也於子祭於孫止穀梁傳隱公五年日格子曰此庶子為君者也庶子不為君則其於母也奈何即其宮而祭焉已主之於孫止乎孫繼禰矣雖欲勿止焉得而勿止山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至於孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕命燕君復修召公之政納貢于周如成康之旹諸侯聞之皆從齊史記齊太公世家日格子曰燕君所至之地齊之故疆歟抑侵小而得之歟故疆天子之所分也不可以與人也若侵小而得之取此與彼其義安在雖使納貢于周是以彊令不以義令也孟子曰非禮之禮殆齊桓之謂矣王使宰孔賜齊侯胙齊侯將下拜孔曰天子使孔曰以伯舅耊老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞下拜登受左傳僖公九年日格子曰拜下禮也齊侯其知此乎推是心也可以進於伯矣髙后崩禄産欲為亂朱虚侯章知其謀乃告其兄齊王發兵西以誅諸呂齊王悉發國中兵使祝午柬詐琅邪王之臨菑計事琅邪王劉澤説齊王曰悼惠王髙皇帝長子大王適長孫也當立今諸大臣狐疑未有所定而澤於劉氏最為長大臣固待澤決計齊王乃送琅邪王禄産作亂朱虚侯與勃平等誅之大臣議欲立齊王而琅邪王及大臣以齊王母家駟鈞惡戾是欲復為吕氏也代王母家薄氏君子長者代王親髙帝子於今見在最為長乃迎立代王而告齊王令罷兵史記齊悼惠王世家日格子曰澤之西也脱齊之留而已乃得吐天下之至計焉其志大其義正然其所言則非天下之極論也代王親髙帝子於今見在最為長天下之極論固於是乎在而以駟鈞薄氏量較孰為惡戾長者何居雖然澤目擊呂氏之變者也茍有慮焉能不是及乎君子論代来之功當以澤為首季子至曰茍先君無廢祀民人無廢主社稷有奉乃吾君也吾敢誰怨乎哀死事生以待天命非我生亂立者從之先人之道也復命哭僚墓復位而待史記吳太伯世家日格子曰説者謂季札辭國而生亂當是旹受而不辭則何以入太伯之廟雖然季子可受也而難為授也或曰季厯傳文王矣有文王則可無文王而傳亦何異於僚哉交阯貢異獸謂之麟光言真偽不可知使其真非自至不足為瑞願還其獻又奏賦以風宋史司馬光傳日格子曰果麟歟貢於交阯亦足為異然非明王所寶也况偽者乎雖然麟有形有性紀載詳矣取而驗之何真偽不可知之有抑非光不能為是言也田況乞歸葬陽翟旣葬託邊事求見泣請終制仁宗惻然許之帥臣得終喪自況始宋史田況傳日格子曰父母之喪無貴賤一也而謂文武異道乎不得已而從金革古之人固有行之者矣若夫無事之旹不失於用而以存禮烏乎而不可聘契丹見其主混同江設宴垂釣每得魚必酌拱辰酒親鼓琵琶以侑飲謂其相曰此南朝少年狀元也入翰林十五年故吾厚待之使還御史趙抃論其輒當非正之禮異旹北使援此以請將何辭拒之宋史王拱辰𫝊日格子曰衛寗武子聘魯文公燕之賦湛露及彤弓武子不拜又不答賦使行人私焉旣託婉辭卒以不敢干禮取戾對為拱辰之道當如此然契丹主非魯君比也其辭之也無亦取武子之意而更其詞乎襄公旣敗於泓而君子或以為多傷中國闕禮義褒之也宋襄之有禮讓也宋㣲子世家日格子曰公羊謂君子大宋襄之不鼓不成列盖聖學不明失其權度故其所稱如此史遷謂傷中國闕禮義褒之也其然豈其然乎詔封太祖諸孫行尊者為主奉太祖後攽言禮諸侯不得祖天子當自奉其國之祖宜崇德昭德芳之後世世勿降爵宗廟祭祀使之在位則所以褒揚藝祖者著矣後二王紹封如攽議宋史劉攽傳日格子曰太宗太祖之弟也於禮為及再傳而後孰非太祖之孫而欲封其諸孫行尊者為主以奉焉何居為王者祖而可使諸侯主之乎攽之議得矣而未能昌言及此吾於是猶少之同知太常禮院天子且親祠執事者習禮壇下必言周官大宗伯凡王之禱祠肄儀為位古禮如此今即祠所習之為不敬乃徙於尚書省宋史邵必傳日格子曰儀可肄也壇不可褻也議禮至此可謂㣲矣謂其㣲也而莫之辯焉君子其將能乎太常將夫夫博士議郎郎官及諸生諸儒㑹白虎觀講議五經同異帝親稱制臨決如孝宣甘露石渠故事作白虎議奏後漢書章帝紀日格子曰此右文之舉也三代以下彬彬乎盛哉衆言淆亂折諸聖吾聞之矣未聞折諸天子也然則議禮考文曷為必出於天子天子制命天子而制道必有聖德不然則所謂雖有其位不敢作禮樂焉者也石渠白虎謂之何哉旹世祖皇帝多求才南官王積翁言南人無如天祥者遂遣積翁諭㫖天祥曰國亡吾分一死矣儻縁寛假得以黄冠歸故鄉他日以方外備顧問可也若遽官之非直亡國之大夫不可與圖存舉其平生而盡棄之將焉用我積翁欲合宋官謝昌元等十人請釋天祥為道士留夢炎不可曰天祥出復號召江南置吾十人於何地事遂已宋史文天祥傳日格子曰黄冠備顧問在天祥可乎曰國亡臣死之正也不臣焉而釋之亦可以無死矣何為乎以備顧問也昔者箕子陳洪範於武王為傳道也不然則武王雖有問箕子其答諸天祥之備顧問也殆權詞哉故南臣十人者之不卒請釋也為身計也其於天祥不能成生抑能成死晉獻公娶于賈無子烝於齊姜生秦穆夫人及太子申生左傳莊公二十八年日格子曰申生可以為世子乎申生獻公烝於齊姜而生者也不可以齒庶而況嫡哉然則春秋曷為世子之有王命矣春秋尊王而作王旣世子之春秋烏得不世子之晉世子當烏乎定立子以嫡無嫡立庶以長不以貴不此之據而唯諸侯之意是聽子孰不可以為世子楚太子建亦然惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸于我生桓公而惠公薨是以隱公立而奉之左傳隱公元年日格子曰禮有之國君雖七十無無主婦者為承祭也攝夫人以承祭盖不敢踐夫人之位也不敢踐夫人之位而子可謂嫡乎是故聲子稱繼室仲子稱仲子妾辭也觀乎此而隱桓之名分定矣聲子娣也故疑於妾而不知禮之有攝也仲子娶也故疑於嫡而不知禮之無再娶也此説者所以紛紛也太尉自涇州以司農徵戒其族過岐朱泚幸致貨幣慎勿納及過泚固致大綾三百匹太尉壻韋晤堅拒不得命至都太尉怒曰終不以在吾第以如司農治事堂棲之梁木上泚反太尉終吏以告泚泚取視其故封識具存段太尉逸事狀日格子曰此不得已而逺汚之道哉雖太尉之賢亦不能無此自開元制禮大臣避諱去國恤章而山陵之禮遂無所執世之不學者乃妄取豫凶事之説而大典闕焉由是累聖山陵皆摭拾殘缺附比倫類已乃斥去其後莫能徵柳子厚裴瑾崇豐二陵集禮後序日格子曰季文子使晉而求遭喪之禮以行其言曰求而無之實難過求何害由此觀之國恤之章奚宜去哉一日㑹朝準先退帝目送之欽若因進曰陛下敬寇準為其有社稷功邪帝曰然欽若曰城下之盟春秋恥之澶淵之舉是城下之盟也其何恥如之帝愀然不悦欽若曰陛下聞博乎博者輸錢欲盡乃罄所有出之謂之孤注陛下寇準之孤注也斯亦危矣由是帝顧準寖衰宋史寇準傳日格子曰當是時策有出準之為者乎有之而準不從準之罪也不然則將從寇乎何以罪準雖然三人謀從一人則二人者皆其讎也招讒起謗尚何異哉西伯歸而獻洛西之地赤壤之田方千里請除炮烙之刑紂許之仍賜弓矢斧鉞得專征典治南國江漢汝潁之諸侯率循西伯之令於是陽為王門築靈臺列侍女撞鐘鼓為樂紂聞之曰西伯改行吾無憂矣通志殷紂本紀日格子曰孔子稱文王至德今是説者不亦異乎靈臺靈沼戒民勿亟七十里之囿芻蕘雉兎與民同之皆文王事也事於斯則德於斯文王何心哉以是為隂孰謂之陽以是為陽孰謂之隂戰國謀士以私意窺聖人一至於是而史家信之烏乎陋矣兖國公主下降將行册禮宿諫曰陛下昔封兩長公主未嘗册命今施之愛女殆非漢明帝所謂我子豈得與先帝子等之義也宋史胡宿傳日格子曰漢明盛德之言然非先王仁率親義率祖之道也若公主下降其當行册禮與否國有舊章循之而已失於前者如不可追則宿之言其亦義也夫被命接伴金國賀生辰使金厯九月晦與統天厯不合崈接使者以恩意乃徐告以南北厯法異同合從㑹慶節正日隨班上壽金使初難之卒屈服孝宗喜謂崈曰使人聽命成禮而還卿之力也宋史丘崈傳日格子曰正日上壽禮之大節也或以厯之不同聽其自行則於國體所損多矣崈乎崈乎可謂能接伴乎寗武子来聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣来繼舊好君辱貺之其敢干大禮以自取戾左傳文公四年日格子曰寗武子之不拜湛露彤弓禮也二詩何詩也而歌於魯侯之堂乎其言曰肄業及之忠告而婉子墨衰絰梁𢎞御戎莱駒為右敗秦師亍殽遂墨以葬文公晉於是始墨左傳僖公三十三年日格子曰墨衰絰而從戎禮之變也禮變於不得已寇不于門庭而興戎以襲人非不得已也不得已而墨可也非不得已而墨謂之何哉遂墨以葬可乎可墨也亦可復也茂州夷剽境上懼討乞降乃縛奴將殺之取血以受盟抃使易用牲皆讙呼聽命宋史趙抃傳日格子曰古者六畜不相為用故用人于社春秋重之彼茂州夷之於我可乎雖然廢盟則何以繫其心易人以牲抃得之矣太史公曰鼂錯為國逺慮禍反近身袁盎權説初寵後辱故古者諸侯地不過百里山海不以封毋親夷狄以疏其屬盖謂吳邪母為權首反受其咎豈盎錯邪史記吳王濞傳日格子曰王制言名山大澤不以封不可為井田以業民也太史公懲吳之富彊逆亂謂先王山澤不封者以是故豈其然哉昔者齊之封實負東海魯之封實環泰山山澤之名且大者孰加於是而齊魯卒為望國抑何異也婁敬論周都洛陽謂諸侯四方貢職道里均矣者是也其曰不欲依險阻令後世驕奢以虐民者無乃太過乎右將軍建前將軍信并軍三千餘騎獨逢單于兵與戰一日餘建盡亡其軍獨以身得亡去自歸大將軍大將軍問其罪議郎周霸曰建棄軍可斬以明將軍之威正閎長史安曰兵法小敵之堅大敵之禽也今建以數千當單亍數萬力戰士盡不敢有二心自歸不當斬大將軍曰青職雖當斬將以臣之尊寵而不敢自擅專誅於境外而具歸天子天子自裁之於是以見為人臣不敢專權不亦可乎遂囚建詣行在所史記衛青傳日格子曰周亞夫不聽天子詔文帝以為眞將軍衞青以蘇建歸天子自裁抑何異也令出不可貳罪疑不敢專夫固各有當也宋祖帝乙鄭祖厲王猶上祖也左傳文公三年日格子曰宋王者之後其祖帝乙禮也鄭諸侯而祖天子謂有功也有功而廢禮可乎魯之郊禘非禮也鄭祖亦云建炎南渡之初車駕已幸錢塘而留張忠獻公於平江以為後鎮時故兵部侍郎湯公實為守將一日聞有赦令當至心獨疑之亟走以白張公公曰姑遣吏屬知書解事者馳徃發視有故則緩驛騎而先取以歸湯公遣官徃視乃明受偽詔也則又以告曰是則其可宣乎張公曰不然事已至此胡可匿且卒徒解於望賜吾屬先受禍矣又何忠之能輸哉湯公曰然則宜奈何張公曰今便發庫錢以示行賞之意乃屏偽赦而隂取故府所藏登極赦書置輿中迎登譙門讀而張之即損其階禁無敢輙登者而散給金帛如常時郊賚故事則可矣湯公行之於是人情畧定乃決大計朱子書偽詔後日格子曰此史所謂秘不宣者也其機權曲折乃如此哉不然仗義連謀討賊復辟亦固當如史之所稱者然人心一譁為力難矣甚矣湯東野之先見有功於魏公也甚矣湯東野之先見有功於魏公也初王拱辰議𣙜河北鹽方平見曰河北再𣙜鹽何也帝曰始立洪耳方平曰昔周世宗以鹽課均之税中今兩税鹽鐵是也豈非再𣙜乎帝驚悟方平請直降手詔罷之宋史張方平傳日格子曰法有異代民無異代茍不參焉而輙有所舉能無如河北再𣙜鹽者乎抑豈惟異代執政者不求諸故雖一代亦有之學史卷五
