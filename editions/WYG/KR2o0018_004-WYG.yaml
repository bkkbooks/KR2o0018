body:
  text: 學史卷四明邵寶撰已凡二十九章齊晏桓子卒晏嬰屨縗斬苴絰帶杖菅屨食鬻居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫左傳襄公十七年日格子曰父母之喪無貴賤一也齊䟽之服飦粥之食自天子達今曰禮卿大夫士異何居斯禮也周其衰矣衞幕布魯幕綃魯衞之所謂禮也非三代之通禮也晏子之老所謂大夫之禮者亦然故晏子不居其曰唯卿為大夫者所謂巽以出之也伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子史記伯夷列傳日格子曰此萬古之髙義也使無中子則國絶矣為夷齊者宜如何哉或曰二子之去以有中子故也燕昭王怨齊未嘗一日而忘報齊也燕國小辟逺力不能制於是屈身下士先禮郭隗以招賢者史記樂毅列傳日格子曰隗賢歟禮之誠是也使其未賢能母累於明哉且後隗而至者禮之能如隗乎不能如隗是廣其途而自塞之也聲之動物尚矣以虚鼓焉者未有能得實應者也其固然哉闕祀而知其必亡故自罪以存焉宗祀為重則身為輕矣不然豈其不能死而如是邪孔子稱殷三仁㣲子是先觀於斯知之矣楚師為陳叛故猶在繁陽韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也今我易之難哉左傳襄公四年日格子曰文王率叛國以事紂臣道也楚非晉君也謂爭陳為易之何居韓厥於是乎失言矣雖然爭地以戰是自為紂也何叛之能率而援文王以為言哉龍廷權安南留後遣弟明㫤掌書記黄成雅来貢㑹含光殿大宴上以成雅坐遠欲稍升位著訪於宰相王旦旦曰昔子産朝周周王饗以上卿之禮子産固辭受下卿之禮而還國家惠綏逺方優待客使固無嫌也乃升成雅于尚書省五品之次宋史交阯傳日格子曰周饗子産以上卿之禮謂物數也非位也王旦引之以升成雅于尚書省五品之次可乎宋之於龍廷固非周於鄭之比也以成雅儗子産何居虢公晉侯朝王王饗醴命之宥皆賜玉五㲄馬三匹非禮也左傳莊公十八年男䞇大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以吿䖍也今男女同贄是無别也莊公二十四年日格子曰異數而同其失也顯異贄而同其失也㣲君子表㣲故大夫宗婦覿用幣書梁孝王使人殺故吳相袁盎景帝召田叔案梁具得其事還報景帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上毋以梁事為也上曰何也曰今梁王不伏誅是漢法不行也如其伏法而太后食不甘味臥不安席此憂在陛下也景帝大賢之史記田叔傳日格子曰此即所謂經術吏之所處也田叔為魯相初到民自言相訟王取其財物百餘人田叔取其渠率二十人各笞五十餘各搏二十怒之曰王非若主邪何自敢言若主魯王聞之大慙發中府錢使相償之相曰王自奪之使相償之是王為惡而相為善也相母與償之於是王乃盡償之史記田叔傳日格子曰田叔之感魯王善矣當是時使王聞之自若也叔則奈何曰諫諫不聽去叔盖能之桓公實怒少姬南襲蔡管仲因而伐楚責包茅不入貢於周室桓公實北征山戎而管仲因而令燕修召公之政於柯之㑹桓公欲背曹沬之約管仲因而信之諸侯由是歸齊故曰知與之為取政之寶也史記管夷吾傳日格子曰桓公管仲之為霸也者斯數言者盡之矣方晏子伏莊公尸哭之成禮然後去豈所謂見義不為無勇者邪史記管晏列傳日格子曰嬰之言曰人有君而人弑之吾安得而死之吾安得而亡之雖然死與亡義之所不得也抑亦不得而討之乎禮曰臣弑君凡在官者殺無赦子弑父凡在宮者殺無赦嬰惟不明此義是以至此非獨無勇也無忌讒太子於平王王怒囚伍奢而使城父司馬奮揚徃殺太子行未至奮揚使人先告太子太子亡奔宋無忌言於平王曰伍奢有二子皆賢不誅且為楚憂可以其父質而召之王使使謂伍奢曰能致汝二子則生不能則死伍奢曰尚必来員必不来王使人召二子曰来吾生汝父不来今殺奢也伍尚欲徃員曰楚非欲以生我父也恐有脱者後生患不如奔他國借力以雪父之耻俱滅無為也伍尚曰我知徃終不能全父命然恨父召我以求生而不徃後不能雪耻終為天下笑耳謂員可去矣汝能報殺父之讎我將歸死尚既就執伍胥遂亡聞太子建在宋徃從之史記伍子胥傳日格子曰伍尚之就死正也胥之逃生權也雖然胥豈真知權哉胥而知權則必假力彊國問罪于楚逐不當立者取讒臣無忌戮之于市乃退而耕焉可也不知出此而引吳入郢其為辱有不忍言者仇一人而戕一國此申包胥之所謂以甚也胥豈真知權哉雖然為尚也易為胥也難宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸来奔效節於府人而出公以其官逆之皆復之亦書以官皆貴之也左傳文公八年日格子曰前志有之大夫死命又曰有官守者不得其職則去故司馬握節死司城效節出春秋皆以官書死去異乎死道一去道二有去於幾者有去於遽者去於幾者與死道同去於遽者與死道異莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮於國僕因國人以弑紀公以其寳玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必逹左傳文公十八年日格子曰季文子三思而行其出莒僕曰今日必達何其不再且三也私意之起實與於己巳無與焉何惑之有莒僕是也若使齊納賂事與僕殊故三思而私起焉爾不然則文子之决不勝其疑疑之時恒多而决之時恒少乎未可執是而疑仲尼之論也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中左傳文公十八年日格子曰伍尚召於楚平惠伯召於宣公皆君命也皆死尚徃以父質也惠伯何居宣公與聞乎殺惡之謀其召惠伯盖欲成其謀爾而惠伯以君命故竟蹈其難好仁不好學其蔽也愚惠伯之謂矣是故伍尚死以成孝惠伯之死愚哉子文之孫箴尹克黄使於齊還及宋聞亂其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗在傳宣公四年日格子曰箴尹知無所逃之義申生之流也雖然申生必死箴尹不必死其無逃同其所以無逃異舜知任不專則功不成業不世則知不周鯀雖治水無功而禹為其子九年之間足知利害不使易業故首命禹為司空平水土誅父用子而舜無疑心戮力勤王而禹無仇色通志帝舜紀日格子曰鯀治水九年禹從之乎不從也賛之乎不賛也今皆不可知矣書稱鯀方命圯族楚詞稱鯀婞直其何有於禹之言哉不然禹受命治水時方娶塗山前此盖弱矣或未之能從且賛也雖然禹聖人也舜之用之豈專為世業哉任大事而求人於世抑舜不可謂無意焉耳且舜以天下而用禹何疑之有禹以天下而用於舜何仇之有而後儒云爾哉甚矣其以常人之心窺聖人也周公之代成王治南面倍依以朝諸侯及七年後還政成王北面就臣位匔匔如畏然初成王少時病周公乃自揃其蚤沈之河以祝於神曰王少未有識奸神命者乃旦也亦藏其䇿於府成王病有瘳及成王用事人或譖周公周公奔楚成王發府見周公禱書乃泣反周公史記魯周公世家日格子曰公辟流言盖嘗居東矣鴟鴞之詩可以觀情九罭之詩可以觀度魯公封也不之魯而楚之之乎他日公病將没曰必葬我成周明不敢離王也而曰避譖之楚何居楚夷狄之國也公且膺之而忍一朝居邪且公前事武王後事成王病也禱也藏冊而祕也讒且譖而居東與奔楚也天動威王發書以泣而反之也何其同也史氏之附㑹一至於是夫何足辯而亦必辯焉者盖不欲使誣詞之加於公也君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫左傳隱公三年日格子曰宋穆公可謂知禮矣從禮而不從君不從君乃所以深從之也不賢而能之乎故曰宣公可謂知人矣此之謂也雖然穆公於馮夷二子擇賢而立以靖社稷立馮則權立夷則正皆賢者之亊宣公之知人固不繫于其子之饗不饗也今以其子之饗而蔽宣公之知人命以義者固若是哉公羊氏曰君子大居正此則君子之論也君子以二公子之立黔牟為不度矣夫能固位者必度於本末而後立衷焉不知其本不謀知本之不枝弗强詩云本枝百世左傳莊公六年日格子曰宣公烝於夷姜而生汲子又娶汲子之妻而生壽及朔三子者皆非所當立也况朔搆汲子并及於壽無故以死則朔也烏得為君黔牟之立謂之不度見成敗而忘義理君子之論豈其然哉鬻拳强諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖君子謂鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善左傳莊公十九年日格子曰用兵脅君幸而從焉則刖以志罪鬻拳之志行矣當是時也使君不從將加兵否乎以是為愛愛其所愛非人臣之所謂愛也鄭靈公食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譖子家子家懼而從之君子曰仁而不武無能達也左傳宣公四年日格子曰易稱神武不殺傳曰我戰則克故人有不仁仁者必武歸生與聞乎弑止弑君者以畜老憚殺乂懼而與乎弑君子謂其仁而不武豈知仁者乎吾於歸生謂之不仁不謂之不武君子謂子然於是不忠茍有可以加於國家者棄其邪可也故用其道不棄其人詩云蔽芾甘棠勿剪勿伐召伯所苃思其人猶愛其樹况用其道而不恤其人乎子然無以勸能矣左傳定公九年日格子曰春秋繁刑子産鑄書於鼎以救弊也叔向尚謂終其世必敗况析之竹刑又改刑鼎之舊乎亂獄滋豐如叔向所云無足怪者析著書列刑名家有曰君父於臣子無厚固不仁者駟歂殺之乃其自取而謂之不忠乎彧病留壽春操饋之食發視乃空器也於是飲藥而卒時年五十漢書茍彧傳蘇氏曰荀文若聖人之徒也其才似張子房道似伯夷蘇文日格子曰彧盖有志於天下者然不能擇所輔於始及其不可輔也亦末如之何也已矣朱子自殺之書殆亦哀之也乎彧也病於知者也何敢望仁蘇子曰文若才似子房子房能用髙祖而彧不能用操子房固如是乎又曰道似伯夷伯夷避紂居北海之濱彧當操之時亦可避矣而且事焉伯夷固如是乎予嘗為之説曰文若志似管仲而才不逮心似召忽而道未聞然非揚雄比也屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之君子曰違而道國語楚屈到日格子曰臨終之命曷為為治乎曷為為亂乎非以時知之以理知之順理為治逆理為亂是故短喪之從為非而嫁妾之從為是薦芰之違為是而易簀之違為非君子曰盡心力以事君舍藥物可也左傳昭公十九年日格子曰人子之於君父當無所不盡其心力若以藥物有毒故舍焉以幸免弑君之罪豈所謂盡心力者邪故曰事親者不可以不知醫知而弗專斯得之矣晉平公使范昭觀齊國之政景公錫之宴晏子在前范昭趨曰願君之倅樽以為壽景公顧左右曰酌寡人樽獻之客晏子撤去樽范昭不説起舞顧太師曰子為我奏成周之樂願舞太師對曰盲臣不習范昭起出門景公謂晏子曰晉使范昭觀國政今子怒使者將奈何晏子曰范昭非不知禮也是欲試吾君嬰故不從召太師而問之對如晏子於是范昭歸報平公曰齊未可并也吾試其君晏子知之吾犯其樂太師知之孔子聞之曰善乎晏子不出爼豆之間折衝千里韓詩外傳范昭日格子曰春秋之時知禮樂者稱起札二子嬰也師也亦可與於此乎起札考文嬰師守器考文存乎學守器存乎節學史卷四
