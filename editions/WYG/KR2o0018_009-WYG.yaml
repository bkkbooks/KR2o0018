body:
  text: 學史卷九明邵寳撰戌凡二十九章孝昭皇帝時北軍監御史為姦穿北門垣以為賈區胡建守北軍尉欲誅監御史乃約其走卒曰我欲與公有所誅吾言取之則取之斬之則斬之於是當選士馬日䕶軍諸校列坐堂皇上監御史亦坐建從走卒趨至堂下拜謁因上堂走卒皆上建跪指監御史曰取彼走卒前拽下堂建曰斬之遂斬監御史建亦已有成奏在其懐遂上奏以聞制曰司馬法曰國容不入軍軍容不入國也建有何疑焉説苑日格子曰監御史自為奸利其罪大矣建以衆斬之可乎軍法惟將軍可以斬人御史天子命監非將軍所得斬也而况尉哉是故請命而斬之則建也可若擅也是鼓亂也建也不容於三王之世文宗與宰相議政適見朗執筆螭頭下謂曰向所論事亦記之乎朕將觀之朗曰臣執筆所書者史也故事天子不觀史昔太宗欲觀之朱子奢曰史不隠善不諱惡自中主而下或飾非䕶失見之則史官無以自免且不敢直筆禇遂良亦稱史記天子言動雖非法必書庶幾自飭帝恱謂宰相曰朗援故事不畀朕見起居注可謂善守職者然人君之為善惡必記朕恐平日言之不恊治體為將來羞庶一見得以自改朗遂上之唐書鄭朗傳日格子曰人主觀起居注以自鑒得失是啟隠惡之端也史非董狐乆矣而直筆猶存於後世者以人主無觀道耳觀道一開顧慮生焉直能無損乎如欲知得失者則凡前史所載孰非殷鑒何必起居注哉衛女嫁齊太子中道太子死問傅母曰且往當喪喪畢女不肯歸終之以死揚雄記雉朝飛操日格子曰禮取女有吉日而女死壻齊衰而弔既葬而除之夫死亦如之衛女之所處當出於此今也不然其於禮過矣然則弔而未葬女則何居女未廟見而死歸葬于女氏之黨示未成婦死不可即墓而生可即其室乎弔而返服以待葬而除焉可也時帝刻日納后而尚書左僕射王彬卒議者以為欲卻期坦曰婚禮之重重於救日蝕救日蝕有后之喪太子墮井則止納后盛禮豈可以臣喪而廢從之晉書孔坦傳日格子曰大臣之喪君與有變焉不卻期而納后是以喪婚也而可乎日食而失期不可追救矣然且以后與太子之變而廢之婚之期可以卻也有大臣之喪而不卻則烏乎可坦之辯斯可以已矣西門豹為鄴令召長老問民之所疾苦長老曰苦為河伯娶婦至其時西門豹往㑹之河上西門豹曰呼河伯婦來視顧謂三老巫祝父老曰是女不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何乆也復以弟子一人投河中有頃曰弟子何乆也復投一弟子河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹立待良乆欲復使廷掾與豪長者一人入趣之皆叩頭破額血流地豹曰河伯留客之乆若皆罷去鄴吏民大驚恐從是以後不敢復言為河伯娶婦史記滑稽列傳日格子曰先是數年秦以君甥妻河盖秦俗之陋甚矣此政父老所苦者巫不殺則妖不止然曷不先之以教乎孟子論殺有所謂生道者豹葢近之吾獨怪其術之勝耳不然則何媿於陳子亢之止狥葬哉子亢仁術也豹術而未仁秦初以君甥妻河解題曰用諸河以求福也無禮之甚也魏文侯使西門豹為鄴令鄴民苦歲為河伯娶婦豹始禁之時魏與秦鄰意者染秦俗與大事記晉定公薨子出公錯立趙鞅降三年之喪為期大事記日格子曰三年之不遂服其非人心所安哉故降而朞又降而三十六日又降而二十七日襄子姊前為代王夫人簡子既葬未除服北登夏屋請代王使厨人操銅枓以食代王及從者行斟隂令宰人各以枓撃殺代王及從官遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之史記趙世家程子曰趙襄子姊為代國夫人既殺代王將奪其國夫人距戰是也身為代國夫人社稷無主獨當其任義不可棄社稷以與弟則戰而段之非姊殺弟也代國夫人殺賊也日格子曰代國夫人為國拒賊不知有弟也弟而伐姊之國弟道亡矣所恨者夫人不能為孫翊之妻之為耳故摩笄以死代人憐之而程子獨論其距戰為是死節著矣戰或疑乎兄弟故闡之耳祜與陸抗相對使命交通抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰羊祜豈酖人者晉書羊祜傳日格子曰抗之飲祜藥也其識度明且𢎞矣雖然此豈人之情與理也哉康子饋藥子拜而受之曰丘未逹不敢嘗葢凡藥之饋也皆當如此而况敵國之將乎馮道根以疾卒於官是日輿駕春祠二廟及出宫有司以聞帝問中書舍人朱异曰吉凶同日今可行乎异對曰昔栁莊寢疾衛獻公當祭請於尸曰有臣桞莊非寡人之臣社稷之臣也聞其死請往不釋祭服而往遂以禭之道根雖未為社稷之臣亦有勞於王室臨之禮也駕即幸其宅哭之甚慟梁書馮道根傳日格子曰子於是日哭則不歌君聞臣之喪哀心生矣而可臨祭乎朱异之論禮也何必援衛獻公事哉獻公以祭服禭其臣非禮也遺詔無起寢廟藏主於光烈皇后更衣别室掃地而祭杅水脯糒而已過百日唯四時設奠置吏卒數人供給洒掃勿開脩道敢有所興作者以擅議宗廟法從事後漢書明帝紀日格子曰三年之喪禮也七世之廟禮也漢之文明三代以下號稱賢君何為為萬世廢禮之倡乎葢文也老明也佛時宣祖為馬軍副都指揮使引兵夜至傳呼開門太祖曰父子雖至親城門王事也不敢奉命明旦乃得入五代史周世宗本紀日格子曰當是時滁已克矣父夜至須旦而入禮也使大敵在外則如之何審而入之其亦可也真宗不豫大漸之夕公與宰執以祈禳宿内殿時仁宗㓜冲八大王元儼者有威名以問疾留禁中累日不肯出執政患之無以為計偶翰林司以金盂貯熟水曰王所須也公取案上墨筆攪水中盡黑令持去王見之大驚意其有毒也即上馬去宋言行録李迪日格子曰墨水之出元儼偶然哉予讀元儼傳彼固賢王也以其問疾乆留不出得無防他奸乎不然水墨矣何為懼毒而出邪古人謂長於料事而不長於料人豈迪謂邪若夫抑邪扶正剪羽翼𢷬腹心以定倉卒之變則如鎻繼恩大矣真宗東封泰山車駕發京師上及從官皆蔬食封禪禮畢上勞王旦等曰卿等乆食蔬不易旦等皆再拜知節獨進言蔬食者惟陛下一人耳旦等在道與臣同次舍無不私食肉旦等再拜曰誠如知節之言宋言行録馬知節日格子曰君蔬臣肉問焉以對禮乎曰事君勿欺禮也雖然無亦以封禪非禮故然歟封禪之非禮乆矣君舉臣諌禮也既從矣君蔬而臣肉雖勿欺欺也國有常刑若郊廟齋則何如曰君絕葷臣亦絕葷禮也蔬食何為公嘗奏事而帶寛誤墜文書于地不顧而行仁宗呼内侍拾以與之議者謂仁宗有人君體宋公得大臣體宋言行録宋庠日格子曰帶寛而文書墜庠葢未之知也知則將請罪不暇而安行自若顧乃以是得大體乎禮將適公所先習容觀玉聲乃出庠也知此則何有帶之寛之有公守蜀兵火之餘人懐反側一日合軍大閲始出衆遂嵩呼者三公亦下馬東望而三呼復攬轡行衆不敢讙或以告魏公公曰當是時琦亦不敢措置宋言行録張詠日格子曰倉卒應變聖人吾不得而知矣自大賢以下當不出此魏公云琦不敢措置予亦云文彦博富弼入相詔百官郊迎鎮曰隆之以虚禮不若推之以至誠近制兩制不得詣宰相居第百官不得間見是不推之以誠也願罷郊迎除謁禁宋史范鎮傳日格子曰相之道莫難於集衆思謁禁不除雖欲集其將能乎若夫郊迎是導諛也范公可謂知相道矣會將祀南郊彗星見宰相趙普召鎬問之鎬曰當祭而日食猶廢况謫見如此乎普言于上即罷其禮宋史杜鎬傳日格子曰當祭而廢禮者有之皆日事也彗非時事即月與旬事郊烏得而廢諸如以災而懼也則修德以弭之禮也徒廢禮焉何居公得謝蘇軾往賀之曰公雖退而名益重矣公愀然曰君子言聽計從消患於未萌使天下隂受其賜無智名勇功吾獨不得為此命也夫使天下受其害而吾享其名吾何心哉軾慙而退宋言行録范鎮日格子曰難進易退君子之盛節也然豈欲以是為名哉是故知者有唁無賀神宗問政府地震之變曾公曰隂盛上曰誰為隂曾公曰臣者君之隂婦者夫之隂夷狄者中國之隂皆宜戒之上問公公曰但為小人黨盛耳上不懌宋言行録呉奎日格子曰夫二子之言何如曰皆未也夫乾天德也坤地德也天不乾故裂地不坤故震政府典章存焉震于是其諸臣下有將變祖宗之法者乎雖然地之不坤盍於乾焉求之公屢薦歐陽公而仁宗不用他日復薦之曰韓愈唐之名士天下望以為相而竟不用使愈為之未必有補於唐而談者至今以為謗歐陽脩今之韓愈也而陛下不用臣恐後之談者謗必及國不特臣也陛下何惜不一試之以曉天下後世也上從之宋言行録韓琦日格子曰相為天下置也故惟其人則心誠取之非其人則心誠舍之姑用焉以求免國謗於後世得無與古迪知忱恂告教厥后者異乎不然則待仁宗淺矣彗出寅艮間耿南仲軰皆謂應在外夷不足憂光奏孔子作春秋不書祥瑞者葢欲使人君恐懼修省未聞以災異歸之外夷也宋史李光傳日格子曰災以分野此列國之占也一統之世則不然大君天下之主有分野無分氣帝欲相王欽若旦曰臣見祖宗朝未嘗有南人當國者真宗遂止旦没後欽若始大用語人曰為王公遲我十年作宰相宋史王旦傳日格子曰論人以地不若以人孟子曰舜東夷之人也文王西夷之人也君不以地而臣獨以地乎人之忠邪南北固皆有之或曰叅任何如曰否惟其人初文帝崩祜謂𫝊𤣥曰三年之喪雖貴遂服自天子逹而漢文除之今主上天縱至孝雖奪服實行喪禮若因此革漢魏之薄而興先王之法不亦善乎𤣥曰漢文以末世淺薄不能行國君之喪故因而除之除之數百年一旦復古難行也祜曰不能使天下如禮且使主遂服不猶善乎𤣥曰此為有父子無君臣三綱之道虧矣祜乃止晉書羊祜傳日格子曰舜典曰帝乃殂落百姓如喪考妣四海遏密八音此堯之民尚矣為之中制焉則有周禮在孰謂有父子無君臣哉其視夫以日易月為愈逺矣從母依之奉養甚厚從母子求為將晞距之曰吾不以王法貸人將無後悔邪固欲之晞乃以為督䕶後犯法睎杖節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者兖州刺史哭弟者茍道將其杖法如此晉書茍晞傳日格子曰此蘇章張鎮周之用心也彼於故人君子猶有議焉而况從昆弟乎法不可貸固也向不貸之以官則何至於法之議也公義私情於是乎在茍不能然而法所必加盍亦自劾其私而聽命於上焉夫猶愈乎爾矣有欲復肉刑者議取死囚試劓刖公著曰試之不死則肉刑遂行矣乃止宋史呂公著傳日格子曰肉刑之不可復無先王之敎以為之先也有教先焉即刑而殺人乃所謂生道不怨者不然雖不殺人吾未見其可也試之何為仲尼惡作俑者試云試云其為俑也大矣公著其知義乎髙帝悉去秦苛儀法為簡易羣臣飲酒争功醉或妄呼抜劍撃柱髙帝患之叔孫通知上益厭之也説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀上曰可試為之令易知度吾所能行為之於是叔孫通使徵魯諸生三十餘人魯有兩生不肯行曰天下初定死者未葬傷者未起又欲起禮樂禮樂所由起積德百年而後可興也吾不忍為公所為叔孫通笑曰若真鄙儒也不知時變遂與所徵三十人西及上左右為學者與其弟子百餘人為綿蕞野外習之史記叔孫通傳日格子曰兩生尚矣叔孫通以隨為通者也然則禮與其興也寧廢歟禮廢於繁難而興於簡易周之文漢髙不能行矣殷之質夏之忠何往不可哉茍簡且易漢髙未必不從也通也不以簡易量主而以尊重逄君故秦儀是采秦苛既除而驕復蹈之此通之罪也不然原廟及果獻誰歟欲者而以文過為逄通之心於是乎可識矣雖然德禮一物也禮茍廢矣百年之内君臣如之何父子如之何而曰吾積德以俟乎故曰兩生尚矣易蠱之上九曰髙尚其事州郡災旱望行部道見飢者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廪糧為作褐衣事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不禀君命擅平二國春秋之義以為美談今望懐義忘罪若繩之以法將乖聖朝愛育之㫖帝嘉意議赦而不罪後漢書王望傳日格子曰汲黯之稱矯韓韶之稱擅王望之稱專亦有辨乎黯非所命故謂之矯韶非所虞故謂之擅望則所部也民飢至此何見之晚而請之不豫也舍專而坐慢望何辭之有茍以急民病而赦之一言足矣亦何必稱華元子反云哉華元子反專二國之平與望事殊比而同之非春秋之㫖也憲有功還為大將軍威震天下復出屯武威㑹帝西祠園陵詔憲與車駕㑹長安及憲至尚書以下議欲拜之伏稱萬歲棱正色曰夫上交不謟下交不黷禮無人臣稱萬歲之制議者皆慙而止後漢書韓稜傳日格子曰古者祝君以萬夀萬年詩書所稱有之自嵩呼聞於漢而萬歲云者遂為祝君之辭一人之外其誰敢干之哉韓稜之處人與張詠之處已何其嚴也然折謟於豫者難在不懼定讙於遽者難在不疑故豫可能也遽不可能也秦興師求九鼎齊使陳臣思帥師來救而秦兵罷解題日按戰國䇿秦興師臨周而求九鼎周君使顔率説齊王曰秦為無道欲興兵臨周而求九鼎周之君臣内自計與秦不若歸之大國齊王大悦發師五萬人使陳臣思將以救周而秦兵罷齊將求九鼎以顔率解之而止大事記日格子曰九鼎曷為鑄於禹哉墨子以為啟鑄紀治水之功以告萬世也是故君天下者當世守而不必代遷遷自商始周克商乃再遷義士之非之也葢有説焉今不可得而聞矣然不歸之周而歸之土中猶有禹之意焉而説者以為傳國之重器也楚之問秦齊之求無足怪者王孫滿曰在徳不在鼎斯言也足以破千古之惑矣學史卷九
