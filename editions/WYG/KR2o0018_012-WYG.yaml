body:
  text: 學史卷十二明邵寳撰丑凡三十章淮南太守楊綝嘗與十餘人同謁帝問乾威曰首立者為誰乾威下殿就視而答曰淮南太守楊綝帝謂乾威曰卿為謁者大夫而不識㕘人何也乾威對曰臣非不識但慮不審所以不敢輕對石建數馬足蓋愼之至帝甚嘉之隋書張乾威傳日格子曰乾威之謂數馬足也其指則慶其稱則建其率畧如此不識㕘人無足怪者㕘人謁者之所司也君問其首而不能夙記以對笏安在乎馬不虞問而問慶數而對焉得易藉茅之義夫人安得比而同之君子謂乾威佞而不誠孝文以李彪為散騎常侍祚入見帝謂曰朕昨誤授一人官祚對曰豈容聖詔一行而有差異帝沉吟曰此自應有讓朕欲别授一官須臾彪有啓云伯石辭卿子産所惡臣欲之已乆不敢辭讓帝嘆謂祚曰卿之忠諫李彪正辭使朕遲回不能復决遂不換李彪官後魏書郭祚傳日格子曰文帝以誤授李彪官語郭祚其然否邪帝知而不决祚聞而不諫彪聞而不辭皆非也决而不直非决也諫而不忠非諫也辭而不誠非辭也上下相率而為偽世道可知矣雲至從平江南以為偏將軍領桂陽太守代趙範範寡嫂樊氏有國色範欲以配雲雲辭曰相與同姓卿兄猶我兄固辭不許蜀志趙雲傳日格子曰娶絶同姓禮也推此意也同姓之婦其可納乎雲武人乃深於禮如此先主於是乎有媿矣内昭德寺火延禁中野狐落野狐落者宫人所居也死者數百人是日宰相兩省官京兆尹中尉樞宻皆集日華門督神䇿兵救火所及獨御史府不至造自劾曰臺繫賊恐人緣以構姦申警備乃得入臣請入三十直崔蠡姚合二十直自贖宰相劾造不待罪於朝而自許輕比不可聽有詔皆奪一月俸唐書温造傳日格子曰造有故不救火雖不自劾可也既劾矣則罪簡自上不待焉而輙擬贖可乎不救火罪小不待罪罪大糧乏不忍遽斂軍中讙謗突將王振乘衆怨紿曰具畚鍤待役衆燒牙門左右奔告國貞逃獄中振引衆刼取之國貞曰與爾等方討賊何事役為衆且引去振曰都統不死吾曹殆矣遂害之并殺其二子及三大將有詔以郭子儀代之國貞清白善用法世稱辨吏然峻於操下故其衆思得子儀而振因肆其惡及子儀至振自謂且見德子儀怒曰汝臨賊境而害主將賊若乘虚是無絳矣又欲為功乎即斬以徇唐書宗室國貞傳日格子曰仲尼曰叔孫昭子之不勞不可能也千載而下乃於子儀見之子儀有國無身者也當是時使振殺國貞誠合衆心子儀固無嫌焉而何斬且徇之有凡子儀之為非為身也為國也殽之役晉人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也猶用孟明孟明增修國政秦伯伐晉濟河焚舟取王官及郊晉人不出遂霸西戎用孟明也左傳成公元年日格子曰秦穆公論用人如秦誓所稱王者之言也迹其所用如其所謂有容者誰歟君子曰秦穆公之為君也舉人之周也與人之壹也周而不求其至徒壹何為秦穆敗而悔齊桓勝而驕易地何如桓量不足穆識有餘敗而有悔也易勝而無驕也難宋公與楚子期以乘車之會公子目夷諫曰楚夷國也彊而無義請君以兵車之會往宋公曰不可吾與之約以乘車之會自我為之自我墮之曰不可終以乘車之會往楚人果伏兵車執宋公以伐宋宋公謂公子目夷曰子歸守國矣國子之國也吾不從子之言以至乎此公子目夷復曰君雖不言國國固臣之國也於是歸設守械而守國楚人謂宋人曰子不與我國吾將殺子君矣宋人應之曰吾賴社稷之神靈吾國已有君矣楚人知雖殺宋公猶不得宋國於是釋宋公宋公釋乎執走之衞公子目夷復曰國為君守之君曷為不入然後逆襄公歸公羊僖公二十一年日格子曰目夷志於復君故權以攝國君茍不反國其如之何君一日乎覊則已一日乎攝已一日乎攝則一日乎圖君之復君覊而死則立君之子請命天子而復仇焉君反則復其所然則何以曰國固吾之國也此固所謂權也邕素輕張說與相惡會仇人告邕贓貸枉法下獄當死許昌男子孔璋上書曰邕剛毅忠烈難不茍免往者折二張之角挫韋氏之鋒雖身受謫屈而姦謀沮解即邕有功於國且邕家無私聚今聞坐贓下吏死在旦夕臣願代邕死臣與邕生平不欵曲臣知有邕邕不知有臣夫知賢而舉仁也任人之患義也獲二善以死臣又何求䟽奏邕得減死貶遵化尉流璋嶺南唐書李邕傳日格子曰正學先生曰𤣥宗之治不足觀賴有孔璋耳烏乎璋感慨士也而正學以蔽一時言則激矣然當其時聽璋言而赦邕且用之復重璋賞進賢勸忠一舉而獲二善治道有不新乎有璋而不用猶無璋也亦何賴之有臣伏讀麟趾新制至母殺其父子不得告告者死三反覆之未得其門案律子孫告父母祖父母者死蓋謂小者攘羊甚者殺害之類未必指母殺父止子不言也今母殺父而子不告知母而不知父且母之於父作合移天既殺已之天復殺子之天二天俱毁豈容頓黙此母之罪義不在赦如或有之可臨時議罪何用豫制斯條以臣管見實所不取後魏書竇瑗傳日格子曰殺父非母也父死子安得不死之告母而死死固吾所也然則豫制之於臨議其與㡬何以豫制之法而父或遺寃是有母而無父也故必臨議焉則罪各有所歸矣母為夫死子為母死禮不著嫁母之服而律令有之余正父之欲使夫人養是母也將使如何而養之邪予聞之母嫁而子從者繼父為之築廟於家門之外使其子祀之而妻不敢與焉說者以為恩雖至親族已絶矣夫不可二故也嫁母不可養於家矣為之子者率其婦子就母之家或舍其側而養之則於禮也其節矣乎或曰此為母之有家者言之則可不幸而無以為家則如之何築室于外可也朱子不養出母議日格子曰父死母嫁子從焉而不父之祭非子也子不從而不母之養亦非子也朱子之議可謂曲盡禮之變矣雖然事固有不能直遂者父之祭茍有奉者春秋墓焉其可也母之養茍有任者旬月饋焉其亦可也此又禮之變也隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢千萬為昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主傅獄繫内官以公主子廷尉上請請論左右人人為言前又入贖陛下許之上曰吾弟老有是一子死以屬我於是為之埀涕歎息良乆曰法令者先帝所造也用弟故而誣先帝之法吾何面目入髙廟乎又下負萬民廼可其奏哀不能自止左右盡悲朔前上夀曰臣聞聖王為政賞不避仇讐誅不擇骨肉陛下行之四海元元各得其所天下幸甚臣朔奉觴昧死載拜上萬歲夀漢書東方朔傳日格子曰豫贖死罪是自為犯法地也愛之能勿距乎今也愛而不距則既許之矣至於獄繫乃始稱法以執何見之晩也何見之晩也𤣥成兄𢎞為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以𢎞當為嗣故勑令自免𢎞懷嫌不去官及賢病篤𢎞竟坐宗廟事繫獄罪未决室家問賢當為後者賢恚恨不肯言於是門下生與宗家議共矯賢令使家丞上書言大行以𤣥成為後賢薨𤣥成即陽病狂卧便利妄笑語昬亂徴至長安既葬當襲爵以病狂不應召大鴻臚奏狀章下丞相御史案驗𤣥成素有名聲士大夫多疑其欲讓爵辟兄者漢書韋𤣥成傳日格子曰𤣥成讓矣佯狂可乎仲雍文身讓有太伯傳有季歴責不在已焉爾也𤣥成知兄之爵不可奪獨不知父之爵不可失乎兄廢以罪弟廢以病此失爵之道也三讓而起斯可矣郅支單于慘毒行於民大惡通於天臣延夀臣湯將義兵行天誅斬郅支首及名王以下宜縣頭槀街蠻夷邸間事下有司丞相匡衡御史大夫繁延夀以為郅支及名王首更歴諸國蠻夷莫不聞知月令春掩骼埋胔之時宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之會優施笑君孔子誅之方盛夏首足異門而出宜縣十日乃埋之有詔將軍議是漢書陳湯傳日格子曰陳湯矯詔殺單于以境外之義不罪焉可也懸首示威何居王者以道為威殺不以道威於何有而可傳於四夷乎掩骼埋胔先王之令也事非不得已而輕廢之何也乃若夾谷之舉論語左氏無聞焉而議者援之此固漢儒之說也尊朝王王復延請登堂尊謂王曰尊來為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相拔刀向王邪王情得又雅聞尊髙名大為尊屈酌酒具食相對極驩漢書王尊傳日格子曰尊之疑東平思王至矣故舉而億中進戈者前其鐏後其刃進矛㦸者前其鐓禮也不自進而使人引之禮之變也蓋世之衰乆矣况負貴若思王者哉宣帝初欲立五后以問儒者辛彦之對曰后與天子匹體齊尊不宜有五妥駁曰帝嚳四妃舜又二妃亦何常數由是封襄城縣伯隋書何妥傳日格子曰古者天子一娶九女嫡一而妾八未聞有五后者也嚳四妃簡狄稱元舜二嬪娥皇稱君千秋無他材能術學又無伐閱功勞特以一言寤意旬月取宰相封侯世未嘗有也後漢使者至匈奴單于問曰聞漢新拜丞相何用得之使者曰以上書言事故單于曰茍如是漢置丞相非用賢也妄一男子上書即得之矣使者還道單于語武帝以為辱命欲下之吏良乆廼貰之漢書車千秋傳日格子曰一言寤意古有之矣傅說是也上書而拜相何不可之有漢之時上書者賈山賈誼董仲舒莫非其人以是為相而號於四夷曰上書得之不亦光乎茍不論其人而徒以上書為陋何言之偏也身既富貴而後母尚在方進内行脩飭供養甚篤及後母終既葬三十六日除服起視事以為身備漢相不敢踰國家之制漢書翟方進傳日格子曰漢文之短䘮為已詔天下也非敢使天下之人皆薄其親也詔之後漢之臣居親之䘮者如之何而方進如此哉從亂命者其罪小附亂命者其罪大甲申使司空告祠髙廟曰髙皇帝與羣臣約非劉氏不王呂太后賊害三趙專王呂氏賴社稷之靈祿産伏誅天命㡬墜危朝更安呂太后不宜配食髙廟同祧至尊薄太后母德慈仁孝文皇帝賢明臨國子孫賴福延祚至今其上薄太后尊號曰髙皇后配食地祇遷呂太后廟主于園四時上祭後漢書光武帝紀日格子曰祖無世祧配不獨毁禮也呂薄之分定矣文帝出於薄其初立詔稱曰側室之子其崩也不敢合葬長陵廟之配其敢干諸髙帝百戰定天下呂后從焉即有可出之罪亦有不可去之義生不可去而没可黜乎黜呂進薄光武行之何汲汲如不得已也無乃為隂郭地邪以妾配廟則誣其祖以妾配社則誣其神非禮之禮雖明詔多方不可以為訓也皇太后率大臣命婦謁宗廟後漢書孝安帝紀日格子曰宗廟何祠乎祠先帝也先后從之大臣命婦禮可以見后不可以見帝男女同贄春秋譏之厚别之義可以死生異乎自撰顯宗起居注削去兄防參醫藥事帝請曰黄門舅旦夕供養且一年既無褒異又不錄勤勞無乃過乎太后曰吾不欲令後世聞先帝數親後宫之家故不著也後漢書皇后紀日格子曰起居注史以傳信後世者也君相觀焉且不可而后可撰乎后不與外事而乃與後世事乎后稱賢於漢乆矣畏後世聞先帝數親後宫之家而不畏後世聞宫中與史官之事而可以為賢乎成帝久亡繼嗣福以為宜建三統封孔子之世以為殷後漢書梅福傳日格子曰崇德象賢古之道也人君稽古從事禮固宜之福以繼嗣而逄焉若有祈然者其所由誤矣孔子萬世道德之師封爵其後禮也而曰為殷後何居殷之後周封之矣孔子殷人也封以殷者一代之典封以孔者萬世之澤光武即南馳至下曲陽傳聞王郎兵在後從者皆恐及至滹沱河候吏還白河水流澌無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰氷堅可度官屬皆喜光武笑曰候吏果妄語也遂前比至河河氷亦合乃令霸䕶度未畢數騎而氷解後漢書王霸傳日格子曰霸之視河其澌將合時邪言合决進也不言合則何言言澌流將退矣退何之哉退何之哉澌合澌流臨河而决未晩也敵追者至反戈必死或因以為功乎霸非知天也知人也車駕臨辟雍召宫拜博士遷左中郎將數納忠言陳政論議切慤朝臣憚其節名播匈奴時北單于遣使求得見宫顯宗勑自整飾宫對曰夷狄眩名非識實者也臣狀醜不可以示逺宜選有威容者帝乃以大鴻臚魏應代之後漢書承宮傳日格子曰色莊為知人之累乆矣北單于之求見宫慕其節也非慕其狀也狀醜而節盛何損於人而以他人代之中國之用人果如是乎不然則偽矣非所以示大體也會前將軍鄧禹西征關中軍糧乏丹率宗族上麥二千斛禹表丹領左馮翊稱疾不視事免歸後漢書王丹傳日格子曰王丹之濟軍乏猶卜式之助邉也丹固無他式之情深矣丹農而士式商而商丹也狷式也譎聰后呼延氏死將納其太保劉殷女其弟乂固諫聰更訪之於太宰劉延年太傅劉景景等皆曰臣常聞太保自云周劉康公之後與聖氏本源既殊納之為允聰大恱晉書載紀劉聰傳日格子曰延年等諂以承旨無足論者姓同而源異婚姻可以通乎禮不娶同姓姓既同矣其源之異則又何論之有漢末張掖人吳詠為䕶羌校尉馬賢所辟後為太尉龐叅掾叅賢相誣罪應死各引詠為證詠計理無兩直遂自刎而死叅賢慚悔自相和釋軓祭其墓而旌其後晉書前涼張軌傳日格子曰以直報怨孔子之論至矣以直報德可乎居兩德之間雖欲不直不可得也死生亦大矣直不猶愈於死歟生不能相直而死能相和非死之為力也感乎吾之誠也茍有其誠豈能感於死而不能感於生乎雖然人至死無所為矣誠於是為至前乎死或未之能也駿境内嘗大饑榖價踊貴市長譚詳請出倉榖與百姓秋收三倍徵之從事隂據諫曰昔西門豹宰鄴積之於人解扁莅東封之邑計入三倍文侯以豹有罪而可賞扁有功而可罰今詳欲因人之饑以要三倍反裘傷皮未足諭之駿納之晉書前涼張駿傳日格子曰文侯之論豹扁允矣其言之也然豹之道古之道也扁之取民者悉矣今為此言得無情法異致乎若曰豹功可賞扁罪可罰此則政人之論也雖然世則衰矣藏民之道廢矣有出有入無利焉其可也一之為甚而可三乎沈約撰宋書約疑立袁粲傳以審武帝武帝曰袁粲自是宋家忠臣南齊書王智深傳日格子曰粲之節於宋大矣傳在必立何必審武帝哉幸而帝稱粲忠不然將廢乎否也古之直也直今之直也婉婉而不直斯為下矣五代史不為韓通立傳君子少之約也吾知免夫莊公死已葬祭仲將往省於留塗出於宋宋人執之謂之曰為我出忽而立突祭仲不從其言則君必死國必亡從其言則君可以生易死國可以存易亡少遼緩之則突可故出而忽可故反是不可得則病然後有鄭國古人之有權者祭仲之權是也公羊傳桓公十一年日格子曰仲之見執也其設心自謀蓋如公羊氏所云者唯其不知權故也權然後知輕重身之重孰與於國生之重孰與於死仲如知權如之何而勿死也仲生鄭相也宋視之重仲死鄭一匹夫耳宋視之輕矣重故將死之輕吾知其不卒死也仲亦權至此乎仲忽焉執茍焉以逃死者也焉知權孟子曰嫂溺援之以手推是道也如仲尼之渝蒲盟亦可也帝將幸東都以璟為刑部尚書西京留守遣内侍將軍楊思朂迎之璟在塗竟不與思朂交言思朂素貴幸歸訴於帝帝嗟歎良乆益重璟唐鑑𤣥宗四年日格子曰璟之於思朂猶孟子之於王驩也明皇知益重璟可謂明矣曷若重之於初乎旌招虞人虞人不至推是志也璟烏得與存朂言不與存朂言而與存朂行何居有君命矣蘧伯玉使人於孔子孔子與之坐而問焉然則非歟敬其主以及其使禮也以言狎之於敬乎何有學史卷十二
