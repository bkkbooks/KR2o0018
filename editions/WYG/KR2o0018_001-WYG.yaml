body:
  text: 學史卷一明邵寶撰寅凡三十章重黎為帝嚳髙辛居火正甚有功能光融天下帝嚳命曰祝融共工氏作亂帝嚳使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟吳回為重黎後復居火正為祝融史記楚世家日格子曰古有火正之官火之為政也何如哉論語曰鑚燧改火此政之大者也所謂光融天下者於是乎在而周禮司烜氏所掌及春秋宋衛陳鄭所紀者政皆在焉今治水之官猶夫古也而火獨缺焉飲知擇水而亨不擇火以祭以養謂之備物可乎或曰庭燎則有司矣雖然此火之末也周公在豐病將沒曰必葬我成周以明吾不敢離成王周公旣卒成王亦讓葬周公於畢從文王以明予小子不敢臣周公也史記魯世家日格子曰葬人之終事也周公然且謹之而況其生哉于成周臣道也成王不敢當則何以易之于畢子道也舍臣道而就子道周公其慰矣夫為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎左傳襄公二十九年日格子曰風十五國二南邶􅅠衛王鄭齊豳秦魏唐陳鄶曹盖周太師樂歌之序如此今詩小異焉殿豳於曹而退秦於魏將無意乎秦將大矣秦西夷之國猶未離其類焉秦茍大則中國之患也聖人於是有憂焉故退之若夫豳之殿則王通氏已論之矣杜洩將以路葬且盡卿禮南遺謂季孫曰叔孫未乗路葬焉用之且冢卿無路介卿以葬不亦左乎季孫曰然使杜洩舍路不可曰夫子受命於朝而聘于王王思舊勲而賜之路復命而致之君君復賜之今死而弗以是棄君命也若命服生弗敢服死又不以將焉用之乃使以葬左傳昭公四年日格子曰禮樂自天子出路車乗馬皆天子所得予也受之其可違乎是故公冶之冕服可以母斂諸侯之賜也曽子之簀不可以不易大夫之賜也天子之賜則不然叔孫旣受矣生以服死以葬禮也孔子至陳主於司城貞子家嵗餘有隼集于陳廷而死楛矢貫之石砮矢長尺有咫陳湣公使使問仲尼仲尼曰隼来逺矣此肅慎之矢也孔子居陳三嵗史記孔子世家日格子曰吾以是知孔子之未嘗為陳侯周臣也使誠為臣者隼之問曷為不于廷而使使即其所主乎又曷為其不召乎大史公不曰仕陳而曰居陳三嵗其不為陳臣也明矣然則孟子何以言之孟子之言盖著貞子之為臣也善擇其君而非侍人與癰疽者比也而孔子之所王正矣司城宋官名貞其諡也盖賢大夫春秋時大夫出而仕鄰國者多有之趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰嗚呼我之懷矣自貽伊慼其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免宣子使趙穿逆公子黒臀于周而立之左傳宣公二年日格子曰穿知有盾而不知有君雖無令甚於有令也盖盾之專久矣靈公之立非盾意也鞅鞅非少主臣盾宜有之穿從其意焉而行大事以為盾必不我討也不然則穿也烏乎敢昔髙祖定天下功臣非同姓疆土而王者八國史記惠景間侯者表日格子曰以王爵封臣非古也漢制也非劉不王非功不侯漢約也雖然創業之君報功之典戚而疏踰焉尊而卑踰焉若固其所未足為帝病也王以親而權力可奪焉故漢約壞於孝惠侯以功而恩寵可圖焉故漢約再壞於孝武烏乎帝其衰矣宋公使邾文公用鄫子于次睢之社欲以屬東夷左傳僖公十九年秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥左傳文公六年日格子曰伯以用夏尊王為事秦穆宋襄志於伯而以非道行之宜其不終也穆也殉人襄也用人上以愛欲易太子呂澤彊要張良曰為我畫計留侯曰此難以口舌爭也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人故逃匿山中義不為漢臣然上髙此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辯士固請宜来来以為客時時從入朝令上見之上知此四人賢則一助也於是呂后令呂澤使人奉太子書迎此四人四人至客建成侯所史記留侯世家日格子曰四老人之避秦猶伯夷太公之避紂也乃若其人品則有間矣而其從惠帝遊也亦與二老之從文王異何則彼以其志此以其謀惟事成而卒去無累斯可稱耳當是時髙帝病且崩矣不然為太子賓客而不先見天子於義何居帝不崩四老其能遂歸乎始伍員與申包胥為交員之亡也謂包胥曰我必覆楚包胥曰我必存之及吳兵入郢伍子胥求昭王旣不得乃掘楚平王墓出其尸鞭之三百然後己申包胥亡於山中使人謂子胥曰子之報讎其以甚乎吾聞之人衆者勝天天定亦能勝人今子故平王之臣親北面而事之今至於僇死人此豈其無天道之極乎伍子胥曰為我謝申包胥曰吾日暮塗逺吾故倒行而逆施之吳王使子胥於齊子胥臨行謂其子曰吾數諫王王不用吾今見吳之亡矣汝與吳俱亡無益也乃屬其子於齊鮑牧而還報吳史記伍子胥傳日格子曰世稱子胥有忠孝大節忠能忘身而不能忘家雖起讒以死未足深累孝知有親而不知有國卒之毒流宗社不亦甚哉然則讎不必復乎殺無極足矣衞侯来獻其乗馬曰啟服塹而死公將為之櫝子家子曰從者病矣請以食之乃以幃裹之左傳昭公二十九年日格子曰敝帷不棄為埋馬也盖古之禮云昭公欲櫝啟服而子家子乃使從者食之何其言與古異也當是時昭公之從者病矣此之不恤而死馬是櫝何哉廐焚子退朝曰傷人乎不問馬而況處昭公之時乎路馬死埋以惟禮也子家子之食從者權也太初元年十一月甲子朔旦冬至天厯始改建於明堂諸神受紀史記太史公自序日格子曰有天厯有人厯天厯始十一月甲子朔夜半冬至如環無窮終則復始太史公所謂天厯此之謂也人厯合是而已故曰夏數得天不得天不足謂之厯王者三正迭建改正不改厯帝一日語神宗曰國家舊制士大夫之子有尚帝女皆升行以避舅姑之尊義甚無謂以富貴之故屈人倫長幼之序可詔有司革之會疾不果神宗述其事宋史英宗本紀日格子曰升行是廢父子之倫也易曰有父子而后有君臣有君臣而無父子何居雖然子不子父不父則臣不臣君不君雖有國吾得而享諸是故君子謹㣲先主於永安病篤召亮於成都屬以後事謂亮曰君才十倍曹丕必能安國終定大事嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢竭股肱之力効忠貞之節繼之以死先主又為詔勅後主曰汝與丞相從事事之如父蜀書諸葛亮傳日格子曰昭烈知臣固不如知子之深也觀其臨終謂嗣子不才知子深矣而謂孔明君可自取是何言歟是何言歟孔明伊尹之儔也昭烈非湯則其知之未盡無足怪者矧惟知子之深而望孔明之切故言激而涉於疑不然以昭烈孔明君臣之契此言奚宜有哉且昭烈之起將復漢祚也今其言若是如漢祚何竭股肱之力効忠貞之節繼之以死盖孔明之心如此然則昭烈之復漢祚固亦不若孔明之篤也哉立敬歸之娣齊歸之子公子裯穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子左傳襄公三十一年日格子曰娣之子長則長非娣之子長亦長凡非適皆庶也凡適庶異長立子之道尚矣為邪説以亂之者亦多有之娣之子其一也君子惡似是而非者辨其能已諸昔召康公命我先君太公曰五侯九伯若實征之以夾輔周室賜我先君履東至海西至河南至穆陵北至無棣史記齊世家日格子曰齊魯皆大國侯伯之命曷為不于魯而于齊乎當是時周公未之魯太公在齊伯禽何可當也雖然周公之化固已行於周南矣鈎弋夫人得幸武帝生子一人昭帝是也武帝年七十昭帝立時年五嵗耳帝譴責鈎弋夫人夫人脱簪珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行女不得活夫人死雲陽宫史記外戚世家日格子曰立其子殺其母孟子所謂一不辜者也武帝為國家為之此武帝所以為武帝也或曰周幽之寵褒姒晉獻之安驪姬皆以奪嫡生亂由不能辨之於早之故武帝於此盖亦有不得已焉者爾褒也戲烽驪也毒胙則有罪矣鈎弋有是哉雖然舍諸長而五齡是立計亦左矣諸王之服不服固不係於鈎弋之死不死也史稱武帝昭然逺見曷不移此心以燭巫蠱之奸乎君君臣臣父父子子固於是乎在景帝居禁中召條侯賜食獨置大胾無切肉又不置櫡條侯心不平顧謂尚席取櫡景帝視而笑曰此非不足君所乎條侯免冠謝史記絳侯世家日格子曰君所雖不足非人臣所敢言也而條侯何為言之當是時怏怏之疑帝蓄之心久矣大胾而不置箸盖將若楚太子享江芉者察焉而條侯一言適逢其機疑其不益乎王餘昧二年楚公子棄疾弑其君靈王代立焉史記吳太伯世家日格子曰春秋書公子比弑楚靈王而史記直謂棄疾弑之何其異也觀從召比於晉比之志久矣棄疾取國於比非取之於圍也謂棄疾弑則謂比何季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之旣得之矣敢告公冶致使而退及舍而後聞取卞公與公冶冕服固辭强之而後受公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非德賞也且無使季氏葬我左傳襄公二十九年日格子曰使之道於是變矣公冶其如季孫何哉言同而心介聊以卒嵗而已此亦不得已之道也鄭游眅將如晉未出竟遭逆妻者奪之以館于邑丁巳其夫攻子明殺之以其妻行子展廢良而立大叔曰國卿君之貳也民之主也不可以茍請舍子明之類求亡妻者使復其所使游氏勿怨曰無昭惡也左傳襄公二十二年日格子曰子展處奪妻者善矣殺人者徒復其所可乎使鄭而有政也施生戮死必有如晉叔向之為論者公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之左傳昭公十年日格子曰杜氏以為不敢與君同也推是心也則凡倉卒之際懼僭而别嫌能無圖諸杞孝公卒晉悼夫人喪之平公不徹樂非禮也禮為鄰國闕左傳襄公二十三年日格子曰諸侯禮絶期喪不曰母有憂戚而已不可以樂乎君子譏不徹樂是也而曰禮為鄰國闕何居母戚不樂禮也為鄰國闕亦禮也淮南小中正王式繼母前夫終更適式父式父終喪服訖議還前夫家亦有繼子奉養至終遂合葬於前夫式自云父臨終母求去父許諾於是制出母齊衰期晉書卞壼傳日格子曰婦更二夫葬從後不從前前義絶矣而從之葬可乎式之情吾不得而知之矣母出而聽其服喪母非出而不養不葬於禮何有然則前夫之子奈何非無所依不可以養非無所歸不可以葬養不可以迎葬不可以祔留侯曰願棄人間事欲從赤松子游耳乃學辟穀道引輕身會髙帝崩呂后德留侯乃强食之留侯不得已强聽而食後八年卒史記留侯世家日格子曰辟穀於髙祖之世而强食於呂后之時留侯其衰矣乎留侯志於退以辟禍而已矣辟穀其術耳未退則辟穀為重旣退則辟穀為輕不食可食亦可雖然今之食猶昔之不食也盖術勝而道㣲矣此其所以為留侯歟仁宗遺賜直百餘萬光率同列三上章謂國有大憂中外窘清不可專用乾興故事若遺賜不可辭宜許侍從進金錢佐山陵不許光乃以所得珠為諌院公使錢金以遺舅氏義不藏于家宋史司馬光傳日格子曰君賜臣受禮也賜而有為則辭之如唐髙宗載金繒賜長孫無忌賜而無名則辭之如漢光武以金帛賜郭況至有金穴之稱臣之義也可以辭可以無辭辭得無傷禮乎念國用之乏而上佐山陵不獲命焉則亦藏之而已矣義不藏于家而他用何義之有如謂乾興故事不可為繼建議而改行之著為令焉其亦可也會稽剡縣人黄初妻趙打殺息載妻王遇赦王有父母及男稱女葉依法徒趙二千里外隆議曰禮律之興本之自然求之情理非從他出父母至親分形同氣稱之於載即載之於趙雖言三世為體猶一稱雖創鉅痛深固無讎祖之義向使石厚之子日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得流名百代舊令凡流徒者同籍親近欲相隨者聽之趙旣流移載為人子何得不從載從而稱不行豈名教所許孫祖之義自不得以永絶事理然也從之南史傅隆傳日格子曰殺人者死減死則流此常法也不曰姑殺婦非可以常法論乎今舍親而議法又舍法而論情何也石碏日磾以國而殺子非私忿故比而同之吾亦未見其可也三王之圍臨淄也齊王使路中大夫告于天子天子復令還報齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨淄數重三國將與盟曰若反言漢已破矣齊趣下三國不且見屠路中大夫旣許至城下望見齊王曰漢已發兵百萬擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫史記齊悼惠王世家日格子曰路中大夫之致命係於天下之故大矣史失其名朱子綱目無大書焉且分注亦遺三國將誅路中大夫一語君子有憾焉雖然名不可得追書可得而補也若曰齊中大夫路某以上命致于齊以是闡幽不亦可乎晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰或以吾城叛吾所甚惡也人以城来吾獨何好焉使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸左傳昭公十五年日格子曰降有二道有叛而降者有服而降者文王之伐崇因壘而降所謂服也鼔人請以城叛則異於是是故服而降可受叛而降不可受男秉義程妻為逃嫁子不得母史記秦始皇本紀日格子曰母云者母之也不得母者猶言父不得而子也妻無夫子獨有母乎學史卷一
