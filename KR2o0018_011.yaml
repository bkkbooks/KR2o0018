body:
  text: 學史卷十一明邵寳撰子凡二十九章敵使來賀會慶節上夀在郊禮散齋之内不當用樂公請令館伴以禮諭之而議者慮其生事多請權用樂者公又請必不得已則上夀日設樂而宣旨罷之及宴使客然後復用上可公奏且曰宴殿雖進御酒亦母用樂惟於使人乃用之諸公顧以為紫宸上夀乃使客之禮固執前議公奏曰彼初未嘗必欲用樂我乃望風希意而自欲用之彼必笑我以敵國之臣而虧事天之禮上嘉納焉朱子撰陳俊卿狀日格子曰郊齋而受夀賀非禮也雖不飲酒可以為禮乎飲酒矣樂作於使人而止於進御其與㡬何雖然夀燕不可移乎君以尊天而移夀燕敵使獨不知天乎飲酒作樂又何議之有任城王澄遭太妃憂臣寮為立碑頌題碑欲云康王元妃澄訪於普惠普惠曰朝典有王妃而無元字魯夫人孟子稱元妃者欲下與繼室聲子相對今烈懿太妃作配先王更無聲子仲子之嫌不假元字以别名位古者婦人從夫諡今烈懿太妃德冠一世故特䝉褒錫豈容於定名之重而不稱烈懿乎澄從之後魏書張普惠傳日格子曰無繼室妃不稱元固也其有繼室而稱元亦叙事之詞然耳若夫碑題則無繼室不稱有繼室亦不稱夫夫婦婦禮也哀帝即位欲臨軒拜授母周貴人為皇太妃虨議曰斯則子爵母也雖欲加崇而實卑之無乃不順乎謂應告顯宗之廟稱貴人仁淑宜加殊禮事不在已可也又妃后雖配君之名然自后以下有夫人九嬪無稱妃今宜稱皇太夫人於名禮順帝不從特下詔拜為皇太妃晉書江虨傳日格子曰稱天以誄天子之禮也下此則如之何稱先命以誅庶免於子爵母乎妃夫人之稱當時則有制矣引古以言何為哉忽一日宣曹彬潘美曰命汝收江南又顧曹曰更不得似往時西川亂殺人曹徐奏曰臣若不奏恐陛下未知曩日西川殺降之事臣曽商量固執不下臣見收得當日文案元不著字太祖令取覽之謂曰如此則當時何故堅執服罪曰臣初與全斌等同被委任若全斌等獲罪臣獨清雪不為穩便所以一向服罪太祖曰卿既欲自當罪又安用留此文字曰臣初謂陛下必行誅戮故留此文書令老母進呈乞全老母之命太祖尤器遇之宋言行録曹彬日格子曰小杖則受大杖則走此古人事親之道也彬留文字而不辯其亦此意也夫重辟則辯不重則服服以全寮友之情辨以成君臣之義臣受非辜君殺無罪皆非義也齊侯使管夷吾平戎于王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還左傳僖公十二年日格子曰管仲辭上卿之饗禮也然仲非知禮者挾齊以致王饗而又以禮辭之虚禮安庸哉蓋假仁者之情如此他日齊侯以天威咫尺下拜受胙亦仲之教也夫自衞如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟左傳襄公二十九年日格子曰季札當餘祭之䘮未踰年而請觀周樂於魯乃以在殯不樂責孫文子乎札於是有考古之心焉非以為樂也札不義其國託使而亡其於禮也變矣是故春秋責之樂之觀無與責焉可也嘗給兩川軍士緍錢詔至西川而東川獨不及軍士謀為變震白主者曰朝廷豈㤀東川邪殆詔書稽留爾即開州帑給錢如西川衆乃定宋史黄震傳日格子曰詔之出豈虞其至此哉兩川同鎭而異使何居經事失宜而使之變必有任其咎者李繼遷擾西鄙保安軍奏獲其母太宗欲誅之以寇準居樞密副使獨召與謀準退過相幕端曰必若此非謀之得也願少緩之端入奏曰昔項羽得太公欲烹之髙祖曰願分我一杯羮夫舉大事不顧其親况繼遷悖逆之人乎陛下今日殺之明日繼遷可擒乎不然徒結怨讐愈堅其叛心爾太宗曰然則何如端曰宜置延州使善養視之以招來繼遷雖不能即降終可以繫其心而母死生之命在我矣太宗撫髀稱善宋史呂端傳日格子曰繼遷之母之獲也何處為善莫善於養莫不善於殺歸之何如此王者事也以疆埸之近事議之則與其歸也寧養曹公南征表會表卒子琮代立遣使請降先主屯樊不知曹公卒至至宛乃聞之遂將其衆去過襄陽諸葛亮說先主攻琮荆州可有先主曰吾不忍也蜀書先主紀日格子曰劉琮可取乎曰可表嘗託孤矣何為其可也曰取之琮不可琮降而國歸操取之操非取之琮也取其地而存其宗何為其不可也先主之不忍仁矣曰小不忍非仁也不忍於琮而忍於璋仁者固如是乎亮上言於後主曰皇帝邁仁樹德覆燾無疆昊天不弔寢疾彌留奄忽升遐乃顧遺詔事惟太宗動容損益百寮發哀滿三日除服到葬期復如禮其郡國太守相都尉縣令長三日便除服臣亮親受勑戒震畏神靈不敢有違臣請宣下奉行蜀志先主傳日格子曰人主之不遂服乆矣雖孔明之賢不能贊禪以行况下此者乎或謂孔明於是乎媿伊尹矣總已之禮三代之常行也尹無庸力焉孔明身聞自取之屬而能不以總已為嫌哉雖然太甲習不義桐宫之放尹實為之孔明有尹之志雖總已以聽亦無不可先主穆皇后陳留人也兄吳壹少孤壹父素與劉焉有舊是以舉家隨焉入蜀焉有異志而聞善相者相后當大貴焉時將子瑁自隨遂為瑁納后瑁死后寡居先主既定益州而孫夫人還吳羣下勸先主聘后先主疑與瑁同族法正進曰論其親踈何與晉文之於子圉乎於是納后為夫人蜀志先主穆皇后傳日格子曰匡衡論妃匹謂后夫人行不侔乎天地則無以奉神靈之統况娶孀婦乎吳后之立當授璽綬孔明與聞焉何為其莫之止也其諸相者大貴之言先入於心孔明雖諫不能囘也不然君子謂孔明庶㡬禮樂而事君顧如是哉法孝直晉文子圉之勸固無足論矣遷大理正有盗官絹置都厠上者史疑女工收以付獄芝曰夫刑罪之失失在苛暴今贓物先得而後訊其辭若不勝掠或至誣服誣服之情不可以折獄且簡而易從大人之化也不失有罪庸世之治耳今宥所疑以隆易從之義不亦可乎太祖從其議魏書司馬芝傳日格子曰先贓後訊何為而易誣服也有承而無追故也獄之情至此㣲矣於此而能用其情烏乎不能用其情哉歸夫人以下至少使漢書文帝紀日格子曰人主臨終而命出宫人盛德事也然夫人以下皆貴妾有名號者方之古昔宜在九嬪之列而俾與宫人同出將孰歸哉敦天下之女教固不如是雖然此漢文短䘮之詔之末詞也吾於是無庸議焉爾矣江陵既平軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或白文帝曰唐瑾大有輜重悉是梁朝珍玩文帝初不信之然欲明其虚實密遣使檢閱之唯見墳籍而已文帝乃歎曰孤知此人不以利干義向若不令檢視恐常人有投杼之疑孤所以益明之耳後周書唐瑾傳日格子曰唐瑾之墳籍猶伏波之薏苡也光武蓄疑致援譽不終周文之檢閱豈不朗豁哉雖然人君所以待將相大臣之體於是為衰矣成公將會厲公會不當期將執公季孫行父曰臣有罪執其君子有罪執其父此聽失之大者也今此臣之罪也舍臣之身而執臣之君吾恐聽失之為宗廟羞也於是執季孫行父公羊傳成公十六年日格子曰諸侯之執於伯主有罪禮也無罪勢也非禮也為臣道者有罪代無罪亦代主辱臣死死且甘之而况於執乎此季孫行父之所能為者也不然有罪歸執於天王無罪距不受執此夾谷之相所能為也非行父之所能為也西門豹治鄴會人數言其過文侯身行其縣果若人言文侯曰翟璜任子治鄴而大亂子能道則可不能將加誅於子西門豹曰王欲為霸王者也臣故蓄積於民君以為不然臣請升城鼓之一皷甲兵粟米可立具也於是乃升城而鼓之一鼓民被甲括矢操兵弩而出再鼓負輦粟而至文侯曰罷之西門豹曰與民約信一舉而欺之後不可復用也燕常侵魏八城臣請北擊之遂舉兵擊燕復地而後反淮南子人間訓日格子曰當其時使無擊燕之舉豹將何以全信於民乎古之信於民者以心心之所存民不可欺也一再皷而民至則顯告以君言之故使旅見於君而遣之民寜以為欺邪乃若驪山之召則異於是縱涇以敗信故不能以信終豹之區區於全信無乃懲於是乎不然則豹欲假君之重而立功耳永寜令李公孝䘮母外繼其後父後妻亡河間劉炫以為無撫育恩議不觧任子翊駮之曰傳云繼母同母齊杖之制皆如親母又為人後者為其父母朞於子之情猶湏隆其本重是以令云為人後者為其父母並解官申其心䘮父卒母嫁為父後者雖不服亦申心䘮其繼母嫁不觧官此專據嫁者生文耳將知繼母在父室則制同親母若謂非恩同之行路乎服既有之心䘮焉可獨異今言令許不解甚謬隋書劉字翊傳日格子曰繼母以父重嫁母以父輕出母以父絶以義制恩而服之隆殺從之禮也昔長沙人王毖漢末為上計詣京師既而吳魏隔絶毖在内國更娶生子昌毖死後昌為東平相始知吳之母亡便情繫居重不攝職事于時議者不以為非隋書劉子翊傳日格子曰毖有妻在吳則魏娶者為妾吳母死而魏母之子居重解官庶子為嫡母服也子翊以此證子外繼後繼母之䘮無乃非義類乎晉鎭南將軍羊祜無子取弟子伊為子祜薨伊不服重祜妻表聞伊辭曰伯生存養已伊不敢違然無父命故還本生尚書彭權議子之出養必由父命無命而出是為叛子於是下詔從之隋書劉子翊傳日格子曰人之子而子於人遂為之子尊父命也父没則母命之父母没矣伯叔雖絶嗣將不得子之乎請於君君命之猶父命之也民之㣲曷以請於君請於令長猶請於君也信之入匈奴與太子俱及至穨當城生子因名曰穨當韓太子亦生子嬰至孝文時穨當及嬰率其衆降漢封穨當為弓髙侯嬰為襄城侯漢書韓王信傳日格子曰二侯何功而封二侯之封文帝為乆逺之計至矣二侯者固中國之世族也父叛子歸祖叛孫歸吾忍棄之乎夫為祖父者雖叛漢不容誅而為之子若孫者終不忘漢而率衆以来降是知君臣之義者矣黄巾賊帥張角等執左道稱大賢以誑燿百姓天下繦負歸之賜時在司徒召掾劉陶告曰張角等遭赦不悔而稍益滋蔓今若下州郡捕討恐更騷擾速成其患且欲切勑刺史二千石簡别流人各䕶歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也賜遂上書言之會去位事留中後帝徒南宫閱錄故事得賜所上張角奏乃感悟下詔封賜臨晉侯邑千五百户後漢書楊賜傳日格子曰楊賜之去妖賊以智不以力其在周易渙之訟羣既渙矣渠魁將焉往哉且治亂賊先黨與春秋法也蓋楊氏經術之傳乆矣彼所謂不戰而屈人兵者豈足以知此嗚呼余書封子重貴為鄭王又書追封皇伯敬儒為宋王者豈無意哉禮兄弟之子猶子也重貴書子可矣敬儒出帝父也書曰皇伯者何哉出帝立不以正而絶其所生也蓋出帝於髙祖得為子而不得為後者髙祖自有子也方髙祖疾病抱其子重睿置於馮道懷中而託之出帝豈得立邪五代史晉本紀論日格子曰為人後者為之子為無子也有子而復子之者固不得為後也出帝於髙祖以為子也可以為為後也不可乃若皇伯之封號禮固有在矣亂世竊攘何足與議此哉晉景公十七年病卜大業之不遂者為祟韓厥稱趙成季之功今後無祀以感景公景公問曰尚有世乎厥於是言趙武而復與故趙氏田邑續趙氏祀史記韓世家日格子曰厥知武乆矣曷不特言景公而必待病且卜邪深哉乎機非智者不足以及此吾嘗謂嬰也杵也蟄九地厥也雷九天蟄非雷不起雷非蟄不鳴深哉乎機非智者不足以及此靈公游於郊令子郢僕郢靈公少子也字子南靈公怨太子出奔謂郢曰我將立若為後郢對曰郢不足以辱社稷君更圖之夏靈公卒夫人命子郢為太子曰此靈公命也郢曰亡人太子蒯瞶之子輙在也不敢當於是衞乃以輙為君是為出公史記衞世家日格子曰郢有命於靈公何為不立也君薨於寢而嗣定焉禮也遊非其時也郊非其地也雖有命猶無命也郢其敢從諸如其時且地郢亦從之矣是故郢之辭禮也然則無媿季札矣而不見稱於君子何哉札之賢非郢之所敢望也雖然仲尼論衞政而先正名君子以為必立郢也其何稱如之吳楚七國反吳使者至淮南淮南王欲發兵應之其相曰大王必欲發兵應吳臣願為將王乃屬相兵淮南相已將兵因城守不聽王而為漢漢亦使曲城侯將兵救淮南淮南以故得完史記淮南王傳日格子曰相者相也相也者詔之以言者也不可詔則扶持之故曰危而不持顚而不扶皆相之道也然言詔之則從違在人扶之持之則進退在我相而請將扶持之善者也是故淮南以完共王游於涇上宻康公從有三女犇之其母曰必致之王夫獸三為羣人三為衆女三為粲王田不取羣公行不下衆御不叄一族夫粲美之物也衆以美物歸女而何德以堪之王猶不堪况爾之小醜乎小醜備物終必亡康公不獻一年共王滅宻史記周本紀日格子曰宻母之言然乎然矣而猶有未然者知王御不叄一族而欲以三犇歸之是愛子而貽禍於王也然則如之何告於王而還其族治犇故而各置之所王與已皆無利焉此事君之道也賢母教子舍此而尚有他道哉厲王蚤失母常附呂后以故得幸無患害而常心怨辟陽侯弗敢發及文帝初即位三年入朝乃往請辟陽侯辟陽侯出見之即自袖鐵椎椎辟陽侯乃馳走闕下肉袒謝曰臣謹為天下誅賊臣報母之仇謹伏闕下請罪孝文傷其志為親故弗治赦厲王史記淮南王傳日格子曰君在上而擅殺一侯是可為也孰不可為也要君無上文帝不議於羣臣不告於髙廟不請於太后而亟赦之是可忍也孰不可忍也厲王之不終誰之過歟且寛於厲王而獨嚴薄昭蓋帝之懲於呂后者深矣遷太常丞以弟服去職後漢書譙𤣥傳舉孝廉光祿主事遭伯父䘮去官戴封傳日格子曰朞之䘮有官守者不遂服乆矣而𤣥也封也以弟伯父䘮去豈時之制固䟽歟抑賢者之過歟無亦將辟世與人故託焉而不顧也史書而不詳蓋二子之意㣲矣慶出後第四叔及遭父憂議者不許為服重慶泣曰禮緣人情若於出後之家更有苴斬之服可奪此以從彼乎四叔薨背已乆情事不追豈容奪禮乖違天性時論不能抑遂以苫凷終䘮後周書抑慶傳日格子曰此猶以情言也夫禮則不然禮為人後者為之子也以不能追服而隆服於所生不亦二乎蓋降服而心䘮焉可也學史卷十一
